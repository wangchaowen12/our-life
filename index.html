  /* Mobile: list by status */
  if (isMobile) {
    return (
      <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
        <FilterBar />
        <AddRow />
        <div className="page-scroll" style={{flex:1}}>
          <div style={{padding:'10px 12px 40px',display:'flex',flexDirection:'column',gap:5}}>
            {colDef.map(col=>(
              <div key={col.key}>
                <p style={{fontSize:10,color:col.accent,fontWeight:500,letterSpacing:'.06em',textTransform:'uppercase',padding:'6px 0 4px'}}>{col.label} · {cols[col.key].length}</p>
                {cols[col.key].map(a=>(
                  <div key={a.id} style={{marginBottom:5}}>
                    <ActionCard action={a} onOpen={()=>setEditAction(a)} dragging={false} onDragStart={()=>{}} onDragEnd={()=>{}} />
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
        {editAction&&<ActionEditModal action={editAction} onSave={a=>{saveEditedAction(a);setEditAction(null);}} onClose={()=>setEditAction(null)} />}
      </div>
    );
  }

  /* Desktop: 3-column Kanban */
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <FilterBar />
      <AddRow />
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {colDef.map((col,ci)=>(
          <div key={col.key}
            onDragOver={e=>{e.preventDefault();setDragOver(col.key);}}
            onDragLeave={()=>setDragOver(null)}
            onDrop={()=>handleDrop(col.key)}
            style={{
              flex:1,display:'flex',flexDirection:'column',minWidth:0,
              borderRight:ci<2?'1px solid #EDE8E0':'none',
              background:dragOver===col.key?'rgba(45,74,62,.04)':'transparent',
              transition:'background .15s',
            }}
          >
            <div style={{padding:'10px 12px 8px',display:'flex',alignItems:'center',gap:5,flexShrink:0,borderBottom:col.borderTop}}>
              <span style={{fontSize:11,fontWeight:500,color:col.accent,letterSpacing:'.04em'}}>{col.label}</span>
              <span style={{fontSize:10,color:'#C0B8AE',background:'rgba(180,172,160,.16)',borderRadius:8,padding:'1px 6px'}}>{cols[col.key].length}</span>
            </div>
            <div style={{flex:1,overflowY:'auto',padding:'8px 9px',display:'flex',flexDirection:'column',gap:6}}>
              {cols[col.key].map(a=>(
                <ActionCard key={a.id} action={a} onOpen={()=>setEditAction(a)}
                  dragging={draggingId===a.id}
                  onDragStart={()=>setDraggingId(a.id)}
                  onDragEnd={()=>{setDraggingId(null);setDragOver(null);}} />
              ))}
              {cols[col.key].length===0&&(
                <div style={{textAlign:'center',padding:'28px 0',color:'#C0B8AE',fontSize:11}}>
                  {col.key==='todo'?'暫無待開始行動':col.key==='doing'?'暫無進行中行動':'還沒有完成的行動'}
                </div>
              )}
            </div>
          </div>
        ))}
      </div>
      {editAction&&(
        <div onClick={()=>setEditAction(null)} style={{position:'fixed',inset:0,zIndex:100,background:'rgba(45,40,35,.22)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#FDFAF5',borderRadius:18,padding:'22px',width:'100%',maxWidth:380,animation:'dialogIn .2s both'}}>
            <h3 style={{fontSize:14,fontWeight:500,color:'#2D2820',marginBottom:4}}>{editAction.title}</h3>
            <p style={{fontSize:10,color:'#A09688',marginBottom:14}}>{editAction.domainTitle} › {editAction.projectTitle}</p>
            <ActionEditModal action={editAction}
              onSave={a=>{saveEditedAction(a);setEditAction(null);}}
              onClose={()=>setEditAction(null)} />
          </div>
        </div>
      )}
    </div>
  );
}


/* ════════════════════════════════════════════════════════
   MEMORY WALL (Completed)
════════════════════════════════════════════════════════ */
function MemoriesPage({ demData }) {
  const [selected, setSelected] = useState(null);
  const [zoom, setZoom]         = useState(1);
  const [pinchRef, setPinchRef] = useState(null);

  /* ── Completion stats ── */
  const projectStats = useMemo(() => (demData.projects||[]).map(proj => {
    const acts    = demData.actions[proj.id]||[];
    const actDone = acts.filter(a=>a.status==='done').length;
    const done    = acts.length > 0 ? actDone===acts.length : proj.status==='done';
    return { ...proj, acts, actDone, actTotal:acts.length, completed:done };
  }), [demData]);

  const dreamDone = projectStats.length > 0 && projectStats.every(p=>p.completed);

  /* ── Build 9×9 mandala grid (2-level: Dream→Project→Action) ──
     Centre block (3-5,3-5): Dream + 8 Project refs
     8 outer blocks: each Project + its Actions               */
  const SURROUND = [[0,0],[0,1],[0,2],[1,0],[1,2],[2,0],[2,1],[2,2]];
  const PROJ_BLOCK = [[0,0],[0,1],[0,2],[1,0],[1,2],[2,0],[2,1],[2,2]]; // outer block (blockRow,blockCol) for proj i

  const grid = useMemo(()=>{
    const g = Array(9).fill(null).map(()=>Array(9).fill(null).map(()=>({type:'empty'})));

    // Dream at absolute centre
    g[4][4] = { type:'dream', title:demData.dream.title, completed:dreamDone, image:demData.dream.image };

    projectStats.forEach((proj,pi)=>{
      if(pi>=8) return;
      const [sur_lr,sur_lc] = SURROUND[pi];
      // Project reference in centre block
      g[3+sur_lr][3+sur_lc] = {
        type:'proj-ref', pi, title:proj.title, owner:proj.owner||'us',
        completed:proj.completed, actDone:proj.actDone, actTotal:proj.actTotal, image:proj.image,
      };
      // Outer block for this project
      const [br,bc] = PROJ_BLOCK[pi];
      const R=br*3, C=bc*3;
      // Project centre cell
      g[R+1][C+1] = {
        type:'project', pi, title:proj.title, owner:proj.owner||'us',
        completed:proj.completed, actDone:proj.actDone, actTotal:proj.actTotal, image:proj.image,
        acts:proj.acts,
      };
      // Action cells
      proj.acts.forEach((act,ai)=>{
        if(ai>=8) return;
        const [lr,lc] = SURROUND[ai];
        g[R+lr][C+lc] = {
          type:'action', pi, ai, title:act.title,
          owner:act.assignee||proj.owner||'us',
          completed:act.status==='done',
          completedAt:act.completedAt||null,
          projectTitle:proj.title,
        };
      });
    });
    return g;
  },[projectStats, dreamDone, demData.dream]);

  /* ── Owner palette ── */
  const OC = {
    apple:{ fill:'#E8956D', light:'rgba(232,149,109,.12)', border:'rgba(232,149,109,.6)', text:'#B05020' },
    pine: { fill:'#2D4A3E', light:'rgba(45,74,62,.10)',    border:'rgba(45,74,62,.55)',   text:'#1E3329' },
    us:   { fill:'#8B7BAF', light:'rgba(139,123,175,.11)', border:'rgba(139,123,175,.6)', text:'#5D4D8F' },
  };

  /* ── Pinch zoom handlers ── */
  function onTouchStart(e){
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      setPinchRef({d,z:zoom});
    }
  }
  function onTouchMove(e){
    if(e.touches.length===2&&pinchRef){
      e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      setZoom(Math.min(3,Math.max(0.4,pinchRef.z*(d/pinchRef.d))));
    }
  }
  function onTouchEnd(){ setPinchRef(null); }

  /* ── Stats ── */
  const totalActs = projectStats.reduce((s,p)=>s+p.actTotal,0);
  const doneActs  = projectStats.reduce((s,p)=>s+p.actDone,0);
  const doneProjs = projectStats.filter(p=>p.completed).length;

  /* ── Single cell renderer ── */
  function MandalaCell({ cell, row, col }) {
    const [hov, setHov] = useState(false);
    const isCenter   = row===4&&col===4;
    const inCenter   = row>=3&&row<=5&&col>=3&&col<=5;
    const isProjCenter = !isCenter && row%3===1 && col%3===1;

    const { type, completed, owner, title, actDone, actTotal, image } = cell;

    if(type==='empty'){
      return <div style={{
        aspectRatio:'1', borderRadius:3,
        background: inCenter?'rgba(45,74,62,.03)':'rgba(200,195,188,.06)',
        border:'1px solid rgba(180,172,160,.12)',
      }}/>;
    }

    const oc = OC[owner]||OC.us;
    const pct = actTotal>0?Math.round(actDone/actTotal*100):completed?100:0;
    const ownerE = owner==='apple'?'🍎':owner==='pine'?'🌲':'🤝';

    // ── VISUAL: ghost vs colour ──────────────────────────────────────────
    // incomplete = very muted; complete = full brand colour
    const bg = completed
      ? (isCenter?'#2D4A3E':oc.fill)
      : inCenter
        ? 'rgba(255,255,255,.45)'
        : 'rgba(220,215,208,.18)';
    const border = completed
      ? (isCenter?'rgba(45,74,62,.8)':oc.border)
      : hov ? oc.border : 'rgba(180,172,160,.22)';
    const txtColor = completed
      ? '#F8F6F1'
      : (hov?oc.text:'rgba(100,95,88,.55)');
    const opacity = completed ? 1 : (hov ? 0.85 : 0.55);

    return (
      <div onClick={()=>setSelected(cell)}
        onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        style={{
          aspectRatio:'1', position:'relative', cursor:'pointer',
          background:bg, border:`1.5px solid ${border}`,
          borderRadius: isCenter?8:isProjCenter?6:4,
          transition:'all .18s', opacity,
          transform:hov?'scale(1.05)':'scale(1)', zIndex:hov?3:1,
          boxShadow:completed&&hov?`0 4px 14px ${oc.light}`:'none',
          overflow:'hidden',
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
          gap:1,padding:2,
        }}
      >
        {/* image bg for completed */}
        {image&&completed&&<img src={image} alt="" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',opacity:.22}} onError={()=>{}}/>}
        {/* progress bar at bottom */}
        {!completed&&pct>0&&<div style={{position:'absolute',bottom:0,left:0,height:2,width:`${pct}%`,background:oc.fill,opacity:.55}}/>}
        {/* content */}
        <div style={{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',gap:1,padding:1}}>
          <span style={{fontSize:isCenter?15:isProjCenter?11:8,lineHeight:1}}>
            {type==='dream'?'✦':completed?'✓':ownerE}
          </span>
          <span style={{
            fontSize:isCenter?10:isProjCenter?9:7,
            color:txtColor, textAlign:'center', lineHeight:1.3,
            overflow:'hidden',display:'-webkit-box',
            WebkitLineClamp:isCenter?3:2,WebkitBoxOrient:'vertical',
            fontWeight:(isCenter||isProjCenter)?500:400,
          }}>{title}</span>
          {(isCenter||isProjCenter)&&actTotal>0&&(
            <span style={{fontSize:7,color:completed?'rgba(255,255,255,.7)':oc.text,lineHeight:1}}>
              {actDone}/{actTotal}
            </span>
          )}
        </div>
      </div>
    );
  }

  /* ── Detail panel ── */
  function DetailPanel({ cell }) {
    if(!cell) return null;
    const proj = cell.pi!==undefined ? projectStats[cell.pi] : null;
    return (
      <div onClick={()=>setSelected(null)} style={{position:'fixed',inset:0,zIndex:100,background:'rgba(45,40,35,.25)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:'#FDFAF5',borderRadius:18,padding:'20px',width:'100%',maxWidth:380,maxHeight:'80vh',overflowY:'auto',animation:'dialogIn .2s both'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
            <div>
              {cell.projectTitle&&<p style={{fontSize:10,color:'#A09688',marginBottom:2}}>{cell.projectTitle}</p>}
              <h3 style={{fontSize:15,fontWeight:500,color:'#2D2820'}}>{cell.title}</h3>
            </div>
            <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',fontSize:18,color:'#A09688',cursor:'pointer'}}>×</button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,padding:'8px 12px',background:cell.completed?'rgba(45,74,62,.08)':'rgba(180,172,160,.08)',borderRadius:9}}>
            <span style={{fontSize:16}}>{cell.completed?'✅':'⏳'}</span>
            <div>
              <p style={{fontSize:12,color:'#2D2820',fontWeight:500}}>{cell.completed?'已完成':'進行中'}</p>
              {cell.actTotal>0&&<p style={{fontSize:10,color:'#A09688',marginTop:1}}>{cell.actDone}/{cell.actTotal} 個行動</p>}
              {cell.completedAt&&<p style={{fontSize:10,color:'#A09688',marginTop:1}}>完成於 {cell.completedAt}</p>}
            </div>
          </div>
          {/* Project actions list */}
          {(cell.type==='project'||cell.type==='proj-ref')&&proj&&proj.acts.length>0&&(
            <div>
              <p style={{fontSize:10,color:'#A09688',marginBottom:7,letterSpacing:'.06em',textTransform:'uppercase'}}>行動項目</p>
              {proj.acts.map(a=>(
                <div key={a.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 9px',background:a.status==='done'?'rgba(45,74,62,.07)':'rgba(180,172,160,.07)',borderRadius:7,marginBottom:4}}>
                  <span style={{fontSize:12,color:a.status==='done'?'#2D4A3E':'#C8C0B4',flexShrink:0}}>{a.status==='done'?'✓':'○'}</span>
                  <span style={{fontSize:12,color:a.status==='done'?'#2D2820':'#7D7468',flex:1}}>{a.title}</span>
                  {a.completedAt&&<span style={{fontSize:9,color:'#C0B8AE'}}>{a.completedAt.slice(5)}</span>}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className="page-scroll">
      <div style={{padding:'16px 14px 48px',maxWidth:860,margin:'0 auto'}}>
        <div style={{marginBottom:14,display:'flex',alignItems:'flex-end',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
          <div>
            <h2 style={{fontFamily:"'Noto Serif TC',serif",fontSize:19,fontWeight:400,color:'#2D2820',marginBottom:3}}>記憶曼陀羅</h2>
            <p style={{fontSize:12,color:'#A09688'}}>完成越多，色彩越豐富</p>
          </div>
          {/* Zoom controls */}
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <button onClick={()=>setZoom(z=>Math.max(.4,z-.15))} style={{width:28,height:28,borderRadius:7,border:'1px solid #E0D9CF',background:'#FFF',cursor:'pointer',fontSize:14,color:'#7D7468'}}>−</button>
            <span style={{fontSize:11,color:'#A09688',minWidth:32,textAlign:'center'}}>{Math.round(zoom*100)}%</span>
            <button onClick={()=>setZoom(z=>Math.min(3,z+.15))} style={{width:28,height:28,borderRadius:7,border:'1px solid #E0D9CF',background:'#FFF',cursor:'pointer',fontSize:14,color:'#7D7468'}}>＋</button>
            <button onClick={()=>setZoom(1)} style={{fontSize:11,padding:'4px 9px',borderRadius:7,border:'1px solid #E0D9CF',background:'#FFF',cursor:'pointer',color:'#A09688'}}>重設</button>
          </div>
        </div>

        {/* Stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7,marginBottom:14}}>
          {[
            {label:'已完成行動',value:`${doneActs}/${totalActs}`,color:'#2D4A3E'},
            {label:'已完成專案',value:`${doneProjs}/${projectStats.length}`,color:'#5A8F7B'},
            {label:'整體進度',  value:`${totalActs>0?Math.round(doneActs/totalActs*100):0}%`,color:'#8B7BAF'},
          ].map(s=>(
            <div key={s.label} className="card" style={{padding:'9px 11px',textAlign:'center'}}>
              <p style={{fontSize:16,fontWeight:600,color:s.color,fontFamily:"'Noto Serif TC',serif"}}>{s.value}</p>
              <p style={{fontSize:9,color:'#A09688',marginTop:2}}>{s.label}</p>
            </div>
          ))}
        </div>

        {/* Mandala with pinch zoom */}
        <div style={{overflow:'auto',WebkitOverflowScrolling:'touch'}}
          onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
          <div style={{
            display:'inline-grid',
            gridTemplateColumns:'repeat(9,1fr)',
            gap:3,
            background:'rgba(238,234,228,.55)',
            borderRadius:14,padding:8,
            border:'1px solid rgba(180,172,160,.3)',
            transform:`scale(${zoom})`,
            transformOrigin:'top left',
            minWidth:480,
            width:'100%',
          }}>
            {grid.map((row,ri)=>row.map((cell,ci)=>{
              const isBlockBorderR=ci===2||ci===5;
              const isBlockBorderB=ri===2||ri===5;
              return (
                <div key={`${ri}-${ci}`} style={{
                  paddingRight:isBlockBorderR?3:0,paddingBottom:isBlockBorderB?3:0,
                  borderRight:isBlockBorderR?'2px solid rgba(180,172,160,.35)':'none',
                  borderBottom:isBlockBorderB?'2px solid rgba(180,172,160,.35)':'none',
                }}>
                  <MandalaCell cell={cell} row={ri} col={ci}/>
                </div>
              );
            }))}
          </div>
        </div>
        <p style={{fontSize:10,color:'#C0B8AE',textAlign:'center',marginTop:10}}>
          點擊格子查看詳情 · 手機可雙指縮放 · 電腦可用 +/− 縮放
        </p>
      </div>
      {selected&&<DetailPanel cell={selected}/>}
    </div>
  );
}


function ReviewPage({ demData, calEvents }) {
  const items = useMemo(()=>{
    const r=[];
    (demData.projects||[]).forEach(proj=>{
      (demData.actions[proj.id]||[]).forEach(a=>{
        if(a.status==='done') r.push({...a,domainTitle:proj.title,projectTitle:proj.title,type:'action',date:a.completedAt||''});
      });
    });
    calEvents.forEach(e=>r.push({...e,type:'event'}));
    return r;
  },[demData,calEvents]);

  const byMonth = useMemo(()=>{
    const map={};
    items.forEach(item=>{ if(!item.date) return; const k=item.date.slice(0,7); if(!map[k]) map[k]=[]; map[k].push(item); });
    return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
  },[items]);

  if(byMonth.length===0) return (
    <div className="page-scroll" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100%'}}>
      <div style={{textAlign:'center',color:'#C0B8AE',padding:40}}>
        <p style={{fontSize:32,marginBottom:10}}>📖</p>
        <p style={{fontFamily:"'Noto Serif TC',serif",fontSize:15,marginBottom:8}}>人生時間軸還是空的</p>
        <p style={{fontSize:12}}>完成的事項和月曆事件，會在這裡形成你們的共同故事</p>
      </div>
    </div>
  );

  return (
    <div className="page-scroll">
      <div style={{padding:'20px 28px 40px',maxWidth:860,margin:'0 auto'}}>
        <h2 style={{fontFamily:"'Noto Serif TC',serif",fontSize:19,fontWeight:400,color:'#2D2820',marginBottom:24}}>生活回顧</h2>
        {byMonth.map(([mk,mitems])=>{
          const [y,m]=mk.split('-');
          return (
            <div key={mk} style={{marginBottom:28}}>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
                <div style={{width:36,height:36,borderRadius:'50%',background:'#2D4A3E',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontSize:10,color:'#F8F6F1',fontFamily:"'Noto Serif TC',serif"}}>{parseInt(m)}</span>
                </div>
                <p style={{fontFamily:"'Noto Serif TC',serif",fontSize:15,color:'#2D2820'}}>{y} 年 {MONTHS[parseInt(m)-1]}</p>
              </div>
              <div style={{marginLeft:18,borderLeft:'1px dashed #D8D0C4',paddingLeft:24,display:'flex',flexDirection:'column',gap:7}}>
                {mitems.map((item,i)=>{
                  if(item.type==='action') return (
                    <div key={item.id+i} style={{position:'relative'}}>
                      <div style={{position:'absolute',left:-28,top:8,width:7,height:7,borderRadius:'50%',background:'#2D4A3E',border:'2px solid #F8F6F1',boxShadow:'0 0 0 1px #2D4A3E'}}></div>
                      <div className="card" style={{padding:'10px 13px'}}>
                        <p style={{fontSize:13,fontWeight:500,color:'#2D2820'}}>✓ {item.title}</p>
                        <p style={{fontSize:11,color:'#A09688',marginTop:2}}>{item.domainTitle} › {item.projectTitle}</p>
                      </div>
                    </div>
                  );
                  const owner=PEOPLE[item.owner]||PEOPLE.us;
                  return (
                    <div key={item.id+i} style={{position:'relative'}}>
                      <div style={{position:'absolute',left:-28,top:8,width:7,height:7,borderRadius:'50%',background:owner.color,border:'2px solid #F8F6F1',boxShadow:`0 0 0 1px ${owner.color}`}}></div>
                      <div className="card" style={{padding:'10px 13px'}}>
                        <p style={{fontSize:13,fontWeight:500,color:'#2D2820'}}>📅 {item.title}</p>
                        <p style={{fontSize:11,color:'#A09688',marginTop:2}}>{item.date} · {owner.name}</p>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   SETUP SCREEN
════════════════════════════════════════════════════════ */
function SetupScreen() {
  return (
    <div style={{minHeight:'100vh',background:'#F8F6F1',display:'flex',alignItems:'center',justifyContent:'center',padding:24,fontFamily:"'Noto Sans TC',sans-serif"}}>
      <div style={{maxWidth:380,width:'100%'}}>
        <div style={{width:48,height:48,borderRadius:14,background:'#2D4A3E',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:16,margin:'0 auto 16px'}}>
          <span style={{fontSize:22,color:'#F8F6F1'}}>✦</span>
        </div>
        <h1 style={{fontFamily:"'Noto Serif TC',serif",fontSize:20,fontWeight:400,color:'#2D2820',textAlign:'center',marginBottom:8}}>需要先設定連線</h1>
        <p style={{fontSize:13,color:'#A09688',textAlign:'center',marginBottom:20}}>請將 Google Apps Script 網址貼入 <code style={{background:'#EDE8E0',padding:'1px 5px',borderRadius:5,fontSize:12}}>APPS_SCRIPT_URL</code></p>
        <div style={{background:'rgba(255,255,255,.8)',border:'1px solid rgba(180,172,160,.4)',borderRadius:16,padding:'20px',fontSize:13,color:'#3D3830'}}>
          <p style={{fontWeight:500,marginBottom:12}}>設定步驟</p>
          <ol style={{paddingLeft:18,display:'flex',flexDirection:'column',gap:8,color:'#7D7468'}}>
            <li>建立 Google Sheets 與 Google Drive 資料夾</li>
            <li>到 <a href="https://script.google.com" target="_blank" style={{color:'#2D4A3E'}}>script.google.com</a> 建立 Apps Script</li>
            <li>貼入 <code style={{background:'#EDE8E0',padding:'1px 4px',borderRadius:4,fontSize:11}}>Code.gs</code>，填入 SHEET_ID 和 FOLDER_ID</li>
            <li>部署為「網路應用程式」，存取選「所有人」</li>
            <li>複製 Web App 網址</li>
            <li>用文字編輯器打開 <code style={{background:'#EDE8E0',padding:'1px 4px',borderRadius:4,fontSize:11}}>platform.html</code>，貼入網址</li>
          </ol>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   APP
════════════════════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState('home');
  const [dreamJump, setDreamJump] = useState(null);

  function onJumpProject(projectId, projectTitle) {
    setDreamJump({ projectId, projectTitle, ts: Date.now() });
    setPage('dream');
  }

  const [state, setState] = useState(() => {
    const saved = lsLoad();
    if (!saved) return buildDefaultState();
    // Migrate old 4-layer data format to new 3-layer if needed
    return { ...saved, demData: migrateData(saved.demData) };
  });

  const [loading, setLoading]   = useState(IS_CONFIGURED);
  const [loadErr, setLoadErr]   = useState('');
  const [syncing, setSyncing]   = useState(false);
  const saveTimerRef = useRef(null);

  // Load from Sheets on mount
  useEffect(() => {
    if (!IS_CONFIGURED) return;
    fetchFromSheets();
  }, []);

  async function fetchFromSheets() {
    setSyncing(true);
    try {
      const data = await sheetsLoadAll();
      setState(prev => {
        try {
          const next = { ...prev };
          // migrateData validates format; falls back to buildDefault() if wrong format
          if (data.demData)     next.demData     = migrateData(data.demData);
          if (data.calEvents && Array.isArray(data.calEvents)) next.calEvents = data.calEvents;
          if (data.todayStatus) next.todayStatus = data.todayStatus;
          if (data.support)     next.support     = data.support;
          lsSave(next);
          return next;
        } catch(e) {
          console.error('setState from Sheets failed:', e);
          return prev; // keep existing state on error
        }
      });
      setLoadErr('');
    } catch(err) {
      setLoadErr('同步失敗：' + err.message);
    } finally {
      setSyncing(false); setLoading(false);
    }
  }

  // Auto-save: localStorage immediately, Sheets debounced 3s
  useEffect(() => {
    lsSave(state);
    if (!IS_CONFIGURED) return;
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      sheetsSave('demData',     state.demData).catch(()=>{});
      sheetsSave('calEvents',   state.calEvents).catch(()=>{});
      sheetsSave('todayStatus', state.todayStatus).catch(()=>{});
      sheetsSave('support',     state.support).catch(()=>{});
    }, 3000);
    return () => clearTimeout(saveTimerRef.current);
  }, [state]);

  function setDemData(updater) {
    setState(s => ({ ...s, demData: typeof updater==='function' ? updater(s.demData) : updater }));
  }
  function setCalEvents(updater) {
    setState(s => ({ ...s, calEvents: typeof updater==='function' ? updater(s.calEvents) : updater }));
  }
  function setTodayStatus(person, field, value) {
    setState(s => ({ ...s, todayStatus: { ...s.todayStatus, [person]: { ...s.todayStatus[person], [field]: value } } }));
  }
  function handleSupportChange(nodeId, newSup) {
    setState(s => ({ ...s, support: { ...s.support, [nodeId]: newSup } }));
  }

  if (!IS_CONFIGURED) return <SetupScreen />;
  if (loading) return (
    <div style={{minHeight:'100vh',background:'#F8F6F1',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Noto Sans TC',sans-serif"}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:40,height:40,borderRadius:12,background:'#2D4A3E',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px'}}>
          <span style={{fontSize:18,color:'#F8F6F1'}}>✦</span>
        </div>
        <p style={{fontSize:13,color:'#A09688'}}>讀取共同資料中…</p>
        {loadErr && <p style={{fontSize:12,color:'#C0887A',marginTop:6}}>{loadErr}</p>}
      </div>
    </div>
  );

  return (
    <div className="platform">
      {/* Sidebar */}
      <nav className="sidebar">
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,marginBottom:8}}>
          <div className="sidebar-brand" title="共同生活平台">✦</div>
          <span style={{fontSize:9,color:'rgba(248,246,241,.55)',letterSpacing:'.04em',lineHeight:1.4,textAlign:'center'}}>🍎🌲<br/>🤝</span>
        </div>
        {PAGES.map(p => (
          <button key={p.key} onClick={() => setPage(p.key)} className={`nav-btn${page===p.key?' active':''}`} title={p.label}>
            <span className="nav-icon">{p.icon}</span>
            <span className="nav-label">{p.label}</span>
          </button>
        ))}
        <button onClick={fetchFromSheets} disabled={syncing} title="同步最新資料" className={`sync-btn${syncing?' spinning':''}`} style={{fontSize:15}}>↻</button>
        <button onClick={async()=>{
          if(!window.confirm('確定要清除所有資料並重新開始嗎？\n（此動作無法復原）')) return;
          try { if(IS_CONFIGURED) await clearSheetsData(); } catch(e){}
          localStorage.clear();
          window.location.reload();
        }} title="清除資料重新開始" style={{marginTop:6,width:36,height:36,borderRadius:10,border:'none',background:'rgba(192,136,122,.25)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(248,246,241,.7)',fontSize:13}}>
          ✕
        </button>
      </nav>

      {/* Page content */}
      <div className="page-content">
        {page==='home'     && <HomePage     demData={state.demData} calEvents={state.calEvents} todayStatus={state.todayStatus} setTodayStatus={setTodayStatus} setPage={setPage} onJumpProject={onJumpProject} />}
        {page==='dream'    && <div style={{flex:1,display:'flex',overflow:'hidden'}}><DreamExpansionMap data={state.demData} setData={setDemData} support={state.support} onSupportChange={handleSupportChange} jumpTo={dreamJump} /></div>}
        {page==='calendar' && <CalendarPage calEvents={state.calEvents} setCalEvents={setCalEvents} />}
        {page==='projects' && <ProjectsPage demData={state.demData} setDemData={setDemData} />}
        {page==='memories' && <MemoriesPage demData={state.demData} />}
        {page==='review'   && <ReviewPage  demData={state.demData} calEvents={state.calEvents} />}
        {loadErr&&page!=='dream'&&<div style={{position:'fixed',bottom:70,left:'50%',transform:'translateX(-50%)',background:'rgba(192,136,122,.9)',color:'#FFF',fontSize:12,padding:'6px 14px',borderRadius:20,pointerEvents:'none',zIndex:30}}>{loadErr}</div>}
      </div>

      {/* Bottom nav (mobile) */}
      <nav className="bottom-nav">
        {PAGES.map(p => (
          <button key={p.key} onClick={() => setPage(p.key)} className={`nav-btn${page===p.key?' active':''}`}>
            <span className="nav-icon">{p.icon}</span>
            <span className="nav-label" style={{color:'rgba(248,246,241,.7)',fontSize:8}}>{p.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={error:null}; }
  static getDerivedStateFromError(e){ return {error:e}; }
  render(){
    if(this.state.error){
      return (
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#F8F6F1',fontFamily:"'Noto Sans TC',sans-serif",padding:32}}>
          <div style={{maxWidth:480,textAlign:'center'}}>
            <p style={{fontSize:32,marginBottom:12}}>⚠️</p>
            <h2 style={{fontSize:16,fontWeight:500,color:'#2D2820',marginBottom:8}}>頁面載入發生錯誤</h2>
            <p style={{fontSize:12,color:'#A09688',marginBottom:16,lineHeight:1.6}}>
              可能是舊版資料格式需要重新整理。<br/>請嘗試清除瀏覽器快取或點擊下方按鈕重設。
            </p>
            <p style={{fontSize:11,color:'#C0B8AE',background:'#EDE8E0',borderRadius:8,padding:'8px 12px',textAlign:'left',wordBreak:'break-all',marginBottom:16}}>
              {this.state.error.toString()}
            </p>
            <button onClick={async()=>{
                try { if(IS_CONFIGURED) await clearSheetsData(); } catch(e){}
                localStorage.clear();
                window.location.reload();
              }}
              style={{background:'#2D4A3E',color:'#F8F6F1',border:'none',borderRadius:10,padding:'10px 24px',fontSize:13,cursor:'pointer'}}>
              清除所有資料並重新載入
            </button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
