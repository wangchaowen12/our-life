<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>蘋果派 × 松果｜共同生活平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" />
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;overflow:hidden}
    body{font-family:'Noto Sans TC','PingFang TC',system-ui,sans-serif;background:#F8F6F1;color:#2D2820}
    /* ── DEM styles ── */
    .node-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);transition:opacity .26s ease,transform .26s ease}
    .node-orbit{position:absolute;transform:translate(-50%,-50%);transition:opacity .26s ease}
    .phase-exit .node-center,.phase-exit .node-orbit{opacity:0}
    .phase-exit .node-center{transform:translate(-50%,-50%) scale(.95)}
    .phase-enter .node-center{animation:cIn .38s cubic-bezier(.22,1,.36,1) both}
    .phase-enter .node-orbit{animation:oIn .42s cubic-bezier(.22,1,.36,1) both}
    @keyframes cIn{from{opacity:0;transform:translate(-50%,-50%) scale(.92)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    @keyframes oIn{from{opacity:0;transform:translate(-50%,-50%) scale(.88)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    .phase-exit .svg-lines{opacity:0;transition:opacity .2s}
    .phase-enter .svg-lines{animation:cIn .5s ease both}
    .svg-lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
    @keyframes demBreathe{
      0%,100%{box-shadow:0 8px 40px rgba(45,74,62,.20),0 0 0 0 rgba(45,74,62,0)}
      50%{box-shadow:0 14px 52px rgba(45,74,62,.32),0 0 0 12px rgba(45,74,62,.06)}
    }
    .dem-breathe{animation:demBreathe 4s ease-in-out infinite}
    @keyframes dialogIn{from{opacity:0;transform:scale(.95) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
    /* ── Layout ── */
    .platform{display:flex;height:100vh;overflow:hidden}
    .sidebar{width:64px;flex-shrink:0;background:#2D4A3E;display:flex;flex-direction:column;align-items:center;padding:16px 0 20px;gap:2px;z-index:50}
    .sidebar-brand{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:16px;cursor:default}
    .nav-btn{width:44px;height:44px;border-radius:12px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:background .15s}
    .nav-btn:hover{background:rgba(255,255,255,0.1)}
    .nav-btn.active{background:rgba(255,255,255,0.18)}
    .nav-icon{font-size:17px;line-height:1}
    .nav-label{font-size:8px;color:rgba(248,246,241,0.65);letter-spacing:.04em;font-family:'Noto Sans TC',sans-serif}
    .nav-btn.active .nav-label{color:#F8F6F1}
    .sync-btn{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,0.08);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(248,246,241,0.5);transition:all .15s;margin-top:auto}
    .sync-btn:hover{background:rgba(255,255,255,0.15);color:#F8F6F1}
    .sync-btn.spinning{animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:58px;background:#2D4A3E;flex-direction:row;align-items:center;justify-content:space-around;z-index:50}
    .page-content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
    @media(max-width:640px){
      .sidebar{display:none}
      .bottom-nav{display:flex}
      .platform{flex-direction:column}
      .page-content{padding-bottom:58px}
    }
    .page-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
    .page-scroll::-webkit-scrollbar{width:4px}
    .page-scroll::-webkit-scrollbar-thumb{background:#D8D0C4;border-radius:4px}
    .card{background:rgba(255,255,255,.75);border:1px solid rgba(180,172,160,.4);border-radius:16px}
    input,textarea,select{font-family:'Noto Sans TC',sans-serif;font-size:13px;color:#2D2820;background:#FFF;border:1.5px solid #E0D9CF;border-radius:10px;padding:9px 12px;outline:none;transition:border-color .15s;width:100%}
    input:focus,textarea:focus,select:focus{border-color:#2D4A3E}
    textarea{resize:none;line-height:1.6}
    button{font-family:'Noto Sans TC',sans-serif;cursor:pointer}
    .btn-primary{background:#2D4A3E;color:#F8F6F1;border:none;border-radius:10px;padding:9px 20px;font-size:13px;transition:background .15s}
    .btn-primary:hover{background:#3A5F4E}
    .btn-ghost{background:none;border:1.5px solid #E0D9CF;border-radius:10px;padding:9px 16px;font-size:13px;color:#7D7468;transition:all .15s}
    .btn-ghost:hover{border-color:#2D4A3E;color:#2D4A3E}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ════════════════════════════════════════════════════════
   ★ 設定區：貼上你的 Google Apps Script 網址
════════════════════════════════════════════════════════ */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwWF7d8VAbj1XhijdKRc8d8eLPwMhdikWxqw5Il4ocRJ_D27IFH5VPmTfjYODdvUXoj/exec';
const IS_CONFIGURED = APPS_SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE';

/* ════════════════════════════════════════════════════════
   Google Sheets / Drive API
════════════════════════════════════════════════════════ */
async function apiGet(params) {
  const url = new URL(APPS_SCRIPT_URL);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  return JSON.parse(await res.text());
}
async function apiPost(body) {
  const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(body), redirect: 'follow' });
  return JSON.parse(await res.text());
}
async function sheetsLoadAll() {
  const r = await apiGet({ action: 'getData' });
  if (r.ok) return r.data;
  throw new Error(r.error || '讀取失敗');
}
async function sheetsSave(key, value) {
  await apiPost({ action: 'saveData', key, value });
}
async function driveUploadImage(dataUrl) {
  const [header, base64] = dataUrl.split(',');
  const mimeType = header.match(/:(.*?);/)[1];
  const filename  = 'node-' + Date.now() + '.' + mimeType.split('/')[1];
  const r = await apiPost({ action: 'uploadImage', filename, base64, mimeType });
  if (r.ok) return r.url;
  throw new Error(r.error || '圖片上傳失敗');
}

/* ════════════════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════════════════ */
const APPLE = { key:'apple', name:'蘋果派', color:'#E8956D' };
const PINE  = { key:'pine',  name:'松果',   color:'#5A8F7B' };
const US    = { key:'us',    name:'我們',   color:'#8B7BAF' };
const PEOPLE = { apple:APPLE, pine:PINE, us:US };

const STATUS_LABEL = { todo:'待開始', doing:'進行中', done:'已完成' };
const STATUS_COLOR = {
  todo:  { bg:'rgba(160,150,136,.1)', text:'#7D7468', border:'rgba(160,150,136,.3)' },
  doing: { bg:'rgba(232,149,109,.1)', text:'#C07040', border:'rgba(232,149,109,.3)' },
  done:  { bg:'rgba(45,74,62,.1)',    text:'#2D4A3E', border:'rgba(45,74,62,.3)'    },
};

const PAGES = [
  { key:'home',      label:'首頁',  icon:'🏠' },
  { key:'dream',     label:'夢想',  icon:'✦'  },
  { key:'calendar',  label:'月曆',  icon:'📅' },
  { key:'projects',  label:'專案',  icon:'◎'  },
  { key:'memories',  label:'回憶',  icon:'📸' },
  { key:'review',    label:'回顧',  icon:'📖' },
];
const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const DAYS   = ['日','一','二','三','四','五','六'];

/* ════════════════════════════════════════════════════════
   DATA MIGRATION (old 4-layer → new 3-layer format)
════════════════════════════════════════════════════════ */
function migrateData(raw) {
  // If no data, use defaults
  if (!raw) return buildDefault();
  try {
    // Validate new format: projects must be a flat array
    if (Array.isArray(raw.projects) && raw.dream) {
      return raw; // already correct format, use as-is
    }
    // Old 4-layer format: has 'domains' array — just discard and use defaults
    // (user has confirmed existing data is minimal, so fresh start is fine)
    console.warn('舊版資料格式，已自動重設為預設資料');
    return buildDefault();
  } catch (e) {
    console.error('migrateData error:', e);
    return buildDefault();
  }
}


/* ════════════════════════════════════════════════════════
   LOCAL STORAGE
════════════════════════════════════════════════════════ */
const LS_KEY = 'apple-pine-v2';
function lsLoad() { try { const s=localStorage.getItem(LS_KEY); return s?JSON.parse(s):null; } catch(e){ return null; } }
function lsSave(s) { try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch(e){} }

/* ════════════════════════════════════════════════════════
   DATA MODEL
════════════════════════════════════════════════════════ */
function uid() { return Math.random().toString(36).slice(2, 9); }

function makeNode(title, desc='') {
  return { id:uid(), title, desc, image:null, updates:[] };
}
function makeAction(title) {
  return { id:uid(), title, desc:'', image:null, updates:[], status:'todo', assignee:'us', dueDate:null, completedAt:null };
}

function buildDefault() {
  // 3-layer: Dream → Project → Action
  // Projects replace both old Domains and sub-Projects
  const projectDefs = [
    { title:'IRC 內在真實練習圈', owner:'apple' },
    { title:'森林療癒',           owner:'pine'  },
    { title:'身心健康',           owner:'us'    },
    { title:'關係經營',           owner:'us'    },
    { title:'學習成長',           owner:'us'    },
    { title:'財務工作',           owner:'us'    },
    { title:'旅行探索',           owner:'us'    },
    { title:'家與生活空間',       owner:'us'    },
  ];
  const projects = projectDefs.map(({ title, owner }) => ({ ...makeNode(title), owner, status:'todo' }));
  const [irc,forest,health,relation,learning,finance,travel,home] = projects;
  const actions = {
    [irc.id]:      ['品牌建立','IRC 網站','年度盛會','SOF研究','引導員培育','課程設計','身體覺察','社群經營'].map(t=>makeAction(t)),
    [forest.id]:   ['森林工作坊','自然教育','森林探勘','森林旅行','合作夥伴','裝備','品牌建立','森林課程'].map(t=>makeAction(t)),
    [health.id]:   ['空中瑜伽','Feldenkrais','運動','睡眠','飲食','身體保養','情緒照顧','休息'].map(t=>makeAction(t)),
    [relation.id]: ['深度對話','約會','共同決策','衝突修復','傾聽','陪伴','家庭','朋友'].map(t=>makeAction(t)),
    [learning.id]: ['閱讀','課程','研究','寫作','海外學習','反思','創作','AI工具'].map(t=>makeAction(t)),
    [finance.id]:  ['收入','投資','儲蓄','工作安排','事業規劃','共同預算','保險','退休規劃'].map(t=>makeAction(t)),
    [travel.id]:   ['京都','大阪','森林旅行','淡蘭古道','海外旅行','文化探索','攝影','自由旅行'].map(t=>makeAction(t)),
    [home.id]:     ['整理收納','工作室','生活儀式','居住品質','家具','植物','居家修繕','共同空間'].map(t=>makeAction(t)),
  };
  return { dream:makeNode('共創理想生活'), projects, actions };
}

function buildDefaultState() {
  return { demData:buildDefault(), calEvents:[], todayStatus:{ apple:{stress:'normal',note:''}, pine:{stress:'normal',note:''} }, support:{} };
}

/* ════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════ */
function todayKey() {
  const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayLabel() {
  const d=new Date(), wd=['日','一','二','三','四','五','六'];
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日 · 星期${wd[d.getDay()]}`;
}
function toKey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function monthGrid(y,m) {
  const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate(), cells=[];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1;d<=days;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);
  return cells;
}
function orbitPositions(n,rx=38,ry=34) {
  return Array.from({length:n},(_,i)=>{const a=(i/n)*2*Math.PI-Math.PI/2;return{x:50+rx*Math.cos(a),y:50+ry*Math.sin(a)};});
}

/* ════════════════════════════════════════════════════════
   IMAGE UPLOAD FIELD
════════════════════════════════════════════════════════ */
function ImageUploadField({ value, onChange }) {
  const [warning, setWarning] = useState('');
  const [uploading, setUploading] = useState(false);
  const [failed, setFailed] = useState(false);

  useEffect(() => { setFailed(false); }, [value]);

  function handleFile(e) {
    const file = e.target.files&&e.target.files[0]; e.target.value='';
    if (!file) return;
    if (file.size>10*1024*1024) { setWarning('照片超過 10MB，請選小一點的'); return; }
    if (!IS_CONFIGURED) { setWarning('請先設定 Google Apps Script 網址才能上傳照片'); return; }
    setWarning(''); setUploading(true);
    const reader = new FileReader();
    reader.onload = async () => {
      try { const url = await driveUploadImage(reader.result); onChange(url); setFailed(false); }
      catch (err) { setWarning('上傳失敗：' + err.message); }
      finally { setUploading(false); }
    };
    reader.onerror = () => { setWarning('讀取失敗'); setUploading(false); };
    reader.readAsDataURL(file);
  }

  return (
    <div style={{ display:'flex',flexDirection:'column',gap:6 }}>
      <label style={{ display:'block',border:'1.5px dashed #D8D0C4',borderRadius:10,padding:'10px',textAlign:'center',fontSize:12,color:uploading?'#C0B8AE':'#A09688',cursor:uploading?'not-allowed':'pointer',background:uploading?'transparent':'rgba(255,255,255,.5)' }}>
        {uploading ? '上傳至 Google Drive 中...' : '📷 上傳照片'}
        <input type="file" accept="image/*" style={{display:'none'}} onChange={handleFile} disabled={uploading} />
      </label>
      {warning && <p style={{fontSize:11,color:'#C0887A'}}>{warning}</p>}
      {value && (
        <div style={{position:'relative',height:80,borderRadius:10,overflow:'hidden',border:'1px solid #E0D9CF'}}>
          {!failed
            ? <img src={value} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}} onError={()=>setFailed(true)} />
            : <div style={{width:'100%',height:'100%',background:'#F0EDE8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'#C0B8AE'}}>圖片無法載入</div>}
          <button type="button" onClick={()=>onChange(null)} style={{position:'absolute',top:4,right:4,width:20,height:20,borderRadius:'50%',background:'rgba(255,255,255,.9)',border:'none',fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>×</button>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   DEM — EditDialog (enhanced with image, updates, support)
════════════════════════════════════════════════════════ */
function EditDialog({ node, layer, onSave, onDelete, onClose, support, onSupportChange }) {
  const [title, setTitle]   = useState(node.title);
  const [desc, setDesc]     = useState(node.desc||'');
  const [image, setImage]   = useState(node.image||null);
  const [owner, setOwner]   = useState(node.owner||node.assignee||'us');
  const [updates, setUpdates] = useState(node.updates||[]);
  const [updateText, setUpdateText] = useState('');
  const [neededText, setNeededText] = useState('');
  const [receivedText, setReceivedText] = useState('');
  const [tab, setTab] = useState('basic'); // basic | updates | support
  const titleRef = useRef();
  const sup = support[node.id] || { needed:[], received:[] };

  useEffect(() => { titleRef.current?.focus(); titleRef.current?.select(); }, []);

  function handleSave() {
    if (!title.trim()) return;
    onSave({ ...node, title:title.trim(), desc:desc.trim(), image, updates, owner, assignee: node.assignee!==undefined ? owner : undefined });
    onClose();
  }
  function handleDelete() {
    if (window.confirm(`確定要刪除「${node.title}」嗎？`)) { onDelete(node.id); onClose(); }
  }
  function addUpdate() {
    if (!updateText.trim()) return;
    const entry = { date:todayKey(), text:updateText.trim() };
    setUpdates(prev=>[entry,...prev]); setUpdateText('');
  }
  function addNeeded() {
    if (!neededText.trim()) return;
    const newSup = { ...sup, needed:[...sup.needed, neededText.trim()] };
    onSupportChange(node.id, newSup); setNeededText('');
  }
  function addReceived() {
    if (!receivedText.trim()) return;
    const newSup = { ...sup, received:[...sup.received, receivedText.trim()] };
    onSupportChange(node.id, newSup); setReceivedText('');
  }

  const tabStyle = (t) => ({
    background:'none', border:'none', cursor:'pointer', fontSize:12,
    padding:'6px 12px', borderRadius:8, fontFamily:'inherit',
    color: tab===t ? '#2D4A3E' : '#A09688',
    background: tab===t ? 'rgba(45,74,62,.08)' : 'none',
    fontWeight: tab===t ? 500 : 400,
  });

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(45,40,35,.25)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#FDFAF5',borderRadius:20,width:'100%',maxWidth:420,maxHeight:'85vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(45,40,35,.14)',animation:'dialogIn .22s cubic-bezier(.22,1,.36,1) both'}}>
        {/* Tabs */}
        <div style={{display:'flex',gap:4,padding:'14px 16px 0',borderBottom:'1px solid #EDE8E0',flexShrink:0}}>
          <button style={tabStyle('basic')} onClick={()=>setTab('basic')}>基本</button>
          <button style={tabStyle('image')} onClick={()=>setTab('image')}>圖片</button>
          <button style={tabStyle('updates')} onClick={()=>setTab('updates')}>更新 {updates.length>0?`(${updates.length})`:''}</button>
          <button style={tabStyle('support')} onClick={()=>setTab('support')}>支持</button>
        </div>

        {/* Content */}
        <div style={{overflowY:'auto',padding:'18px 20px',flex:1}}>
          {tab==='basic' && (
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div>
                <label style={{display:'block',fontSize:10,color:'#A09688',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:5}}>標題</label>
                <input ref={titleRef} value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSave()} placeholder="節點名稱…" />
              </div>
              {/* Show owner for domain / project nodes (layer passed via editTarget) */}
              {layer==='projects' && (
                <div>
                  <label style={{display:'block',fontSize:10,color:'#A09688',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:5}}>負責人</label>
                  <select value={owner} onChange={e=>setOwner(e.target.value)} style={{fontSize:13,padding:'9px 12px',borderRadius:10,border:'1.5px solid #E0D9CF',background:'#FFF',width:'100%',fontFamily:'inherit'}}>
                    <option value="apple">🍎 蘋果派</option>
                    <option value="pine">🌲 松果</option>
                    <option value="us">🤝 我們（共同）</option>
                  </select>
                </div>
              )}
              <div>
                <label style={{display:'block',fontSize:10,color:'#A09688',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:5}}>描述</label>
                <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="這個節點的意義…" rows={3} />
              </div>
            </div>
          )}
          {tab==='image' && (
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <p style={{fontSize:12,color:'#A09688'}}>上傳一張代表這個節點的照片或願景圖</p>
              <ImageUploadField value={image} onChange={setImage} />
            </div>
          )}
          {tab==='updates' && (
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{display:'flex',gap:8}}>
                <input value={updateText} onChange={e=>setUpdateText(e.target.value)} placeholder="記錄一個新進展…" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&addUpdate()} />
                <button onClick={addUpdate} className="btn-primary" style={{padding:'9px 14px',flexShrink:0}}>加入</button>
              </div>
              {updates.length===0 && <p style={{fontSize:12,color:'#C0B8AE',textAlign:'center',padding:'20px 0'}}>還沒有更新紀錄</p>}
              {updates.map((u,i)=>(
                <div key={i} style={{display:'flex',gap:8,borderBottom:'1px solid #EDE8E0',paddingBottom:8}}>
                  <span style={{fontSize:11,color:'#C0B8AE',flexShrink:0,marginTop:1}}>{u.date}</span>
                  <span style={{fontSize:13,color:'#3D3830',lineHeight:1.5}}>{u.text}</span>
                </div>
              ))}
            </div>
          )}
          {tab==='support' && (
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              <div>
                <p style={{fontSize:11,color:'#A09688',marginBottom:8,letterSpacing:'.04em'}}>我希望伴侶如何支持我</p>
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  <input value={neededText} onChange={e=>setNeededText(e.target.value)} placeholder="例如：陪我討論、給我回饋…" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&addNeeded()} />
                  <button onClick={addNeeded} className="btn-primary" style={{padding:'9px 14px',flexShrink:0}}>加入</button>
                </div>
                {sup.needed.length===0 && <p style={{fontSize:11,color:'#C0B8AE'}}>尚未填寫</p>}
                {sup.needed.map((n,i)=><p key={i} style={{fontSize:12,color:'#3D3830',padding:'5px 0',borderBottom:'1px solid #F0EDE8'}}>· {n}</p>)}
              </div>
              <div>
                <p style={{fontSize:11,color:'#A09688',marginBottom:8,letterSpacing:'.04em'}}>已收到的支持</p>
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  <input value={receivedText} onChange={e=>setReceivedText(e.target.value)} placeholder="記錄一個收到的支持…" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&addReceived()} />
                  <button onClick={addReceived} className="btn-primary" style={{padding:'9px 14px',flexShrink:0}}>加入</button>
                </div>
                {sup.received.length===0 && <p style={{fontSize:11,color:'#C0B8AE'}}>尚未紀錄</p>}
                {sup.received.map((n,i)=>(
                  <p key={i} style={{fontSize:12,color:'#2D4A3E',padding:'5px 0',borderBottom:'1px solid #F0EDE8'}}>✓ {n}</p>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 20px',borderTop:'1px solid #EDE8E0',flexShrink:0}}>
          <button onClick={handleDelete} style={{background:'none',border:'none',fontSize:12,color:'#C0887A',fontFamily:'inherit',cursor:'pointer'}}>刪除節點</button>
          <div style={{display:'flex',gap:8}}>
            <button onClick={onClose} className="btn-ghost" style={{padding:'7px 16px',fontSize:12}}>取消</button>
            <button onClick={handleSave} className="btn-primary" style={{padding:'7px 18px',fontSize:12}}>儲存</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   DEM — OrbitNode
════════════════════════════════════════════════════════ */
function OrbitNode({ node, pos, delay, onZoomIn, onEdit, isPlaceholder }) {
  const [hovered, setHovered] = useState(false);

  const OC = {
    apple:{ border:'rgba(232,149,109,.55)', bg:'rgba(232,149,109,.09)', accent:'#E8956D', glow:'rgba(232,149,109,.22)' },
    pine: { border:'rgba(45,74,62,.5)',     bg:'rgba(45,74,62,.08)',    accent:'#2D4A3E', glow:'rgba(45,74,62,.20)'    },
    us:   { border:'rgba(139,123,175,.5)',  bg:'rgba(139,123,175,.08)', accent:'#8B7BAF', glow:'rgba(139,123,175,.20)' },
  };
  const nodeOwner = node?._owner || node?.owner || node?.assignee || 'us';
  const oc  = OC[nodeOwner] || OC.us;
  const pct = (node?._actCount > 0) ? Math.round((node?._actDone||0) / node._actCount * 100) : null;
  const OUTER = 118, INNER = 104, r = (OUTER - 8) / 2;
  const circ  = 2 * Math.PI * r;
  const ownerEmoji = nodeOwner==='apple'?'🍎':nodeOwner==='pine'?'🌲':'🤝';

  if (isPlaceholder) {
    return (
      <div className="node-orbit" style={{left:`${pos.x}%`,top:`${pos.y}%`,animationDelay:`${delay}ms`}}>
        <div onClick={onZoomIn} onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
          style={{width:90,height:90,borderRadius:'50%',border:`2px dashed ${hovered?'#2D4A3E':'#C8C0B4'}`,background:hovered?'rgba(45,74,62,.04)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all .2s'}}>
          <span style={{fontSize:22,color:hovered?'#2D4A3E':'#C8C0B4'}}>＋</span>
        </div>
      </div>
    );
  }

  return (
    <div className="node-orbit" style={{left:`${pos.x}%`,top:`${pos.y}%`,animationDelay:`${delay}ms`}}
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}>
      <div style={{position:'relative',width:OUTER,height:OUTER}}>

        {/* Progress ring */}
        {pct !== null && (
          <svg width={OUTER} height={OUTER}
            style={{position:'absolute',top:0,left:0,transform:'rotate(-90deg)',pointerEvents:'none',zIndex:1}}>
            <circle cx={OUTER/2} cy={OUTER/2} r={r} fill="none" stroke="rgba(180,172,160,.18)" strokeWidth={3.5}/>
            <circle cx={OUTER/2} cy={OUTER/2} r={r} fill="none" stroke={oc.accent} strokeWidth={3.5}
              strokeDasharray={`${pct/100*circ} ${circ}`} strokeLinecap="round"
              opacity={hovered?0.95:0.6} style={{transition:'opacity .3s'}}/>
          </svg>
        )}

        {/* Edit button */}
        <div onClick={e=>{e.stopPropagation();onEdit();}}
          style={{position:'absolute',top:6,right:6,width:20,height:20,borderRadius:'50%',
            background:hovered?oc.accent:'transparent',display:'flex',alignItems:'center',
            justifyContent:'center',cursor:'pointer',opacity:hovered?1:0,
            transition:'all .15s',zIndex:3,fontSize:10,color:'#F8F6F1'}}>
          ✎
        </div>

        {/* Main circle */}
        <div onClick={onZoomIn}
          style={{
            position:'absolute', top:(OUTER-INNER)/2, left:(OUTER-INNER)/2,
            width:INNER, height:INNER, borderRadius:'50%',
            background: hovered ? 'rgba(255,255,255,.96)' : oc.bg,
            border:`1.5px solid ${hovered ? oc.border : 'rgba(180,172,160,.28)'}`,
            backdropFilter:'blur(10px)',
            display:'flex',alignItems:'center',justifyContent:'center',
            flexDirection:'column',gap:2,
            cursor:'pointer',
            transition:'all .2s cubic-bezier(.22,1,.36,1)',
            transform: hovered ? 'scale(1.07)' : 'scale(1)',
            boxShadow: hovered ? `0 8px 24px ${oc.glow}` : '0 2px 10px rgba(0,0,0,.05)',
            overflow:'hidden', zIndex:2,
          }}
        >
          {/* Image overlay */}
          {node.image && (
            <div style={{position:'absolute',inset:0,borderRadius:'50%',overflow:'hidden',opacity:hovered?.50:.28,transition:'opacity .2s'}}>
              <img src={node.image} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}} onError={()=>{}}/>
            </div>
          )}

          {/* Owner emoji */}
          <span style={{fontSize:13,position:'relative',lineHeight:1,transition:'transform .2s',transform:hovered?'scale(1.15)':'scale(1)'}}>
            {ownerEmoji}
          </span>

          {/* Title */}
          <span style={{
            fontSize: node.title.length>8 ? 10 : 11,
            fontWeight:500,
            color: hovered ? oc.accent : '#3D3830',
            textAlign:'center',lineHeight:1.4,
            padding:'0 7px',position:'relative',
            transition:'color .18s',
          }}>
            {node.title}
          </span>

          {/* Counts + progress % */}
          {(node._projCount!==undefined || node._actCount!==undefined) && (
            <span style={{fontSize:8,color:hovered?oc.accent:'#A09688',position:'relative',textAlign:'center',lineHeight:1.6,transition:'color .18s'}}>
              {node._projCount!==undefined && <span>{node._projCount}P</span>}
              {node._projCount!==undefined && node._actCount!==undefined && <span style={{margin:'0 2px'}}>·</span>}
              {node._actCount!==undefined && <span>{node._actCount}A</span>}
              {pct!==null && (
                <span style={{marginLeft:3,color:pct>=70?'#2D4A3E':pct>=40?'#C07040':'#A09688',fontWeight:500}}>
                  {pct}%
                </span>
              )}
            </span>
          )}
        </div>
      </div>
    </div>
  );
}


/* ════════════════════════════════════════════════════════
   DEM — DreamExpansionMap
════════════════════════════════════════════════════════ */
function DreamExpansionMap({ data, setData, support, onSupportChange, jumpTo }) {
  const [stack, setStack]          = useState([{id:'dream',title:data.dream.title,depth:0}]);
  const [phase, setPhase]          = useState('idle');
  const [pendingStack, setPending] = useState(null);
  const [animating, setAnimating]  = useState(false);
  const [editTarget, setEditTarget] = useState(null);

  // Jump to a specific project when requested from Home page
  useEffect(()=>{
    if (!jumpTo?.projectId) return;
    const proj = (data.projects||[]).find(p=>p.id===jumpTo.projectId);
    if (!proj) return;
    setStack([
      {id:'dream', title:data.dream.title, depth:0},
      {id:proj.id, title:proj.title,       depth:1},
    ]);
  },[jumpTo]);

  const current    = stack[stack.length-1];
  const depthLabel = ['專案','行動'][current.depth]||'';

  const getList = useCallback((id,depth)=>{
    if(depth===0) return Array.isArray(data.projects)?data.projects:[];  // guard: flat array only
    if(depth===1) return data.actions[id]||[];
    return [];
  },[data]);

  const children = useMemo(()=>{
    const list = getList(current.id, current.depth);
    if (current.depth===0) {
      // Projects: enrich with action count + done count
      return list.map(proj=>{
        const acts   = data.actions[proj.id]||[];
        const actDone= acts.filter(a=>a.status==='done').length;
        return {...proj, _actCount:acts.length, _actDone:actDone, _owner:proj.owner||'us'};
      });
    }
    // depth 1: actions — just return as-is with owner hint
    return list.map(a=>({...a, _owner:a.assignee||'us'}));
  },[getList, current, data]);
  const slots = [...children,...Array(Math.max(0,8-children.length)).fill(null)].slice(0,9);
  const positions = orbitPositions(slots.length);

  const navigate = useCallback((ns)=>{ if(animating) return; setAnimating(true); setPhase('exit'); setPending(ns); },[animating]);
  useEffect(()=>{
    if(phase==='exit'){ const t=setTimeout(()=>{ setStack(pendingStack); setPhase('enter'); },260); return()=>clearTimeout(t); }
    if(phase==='enter'){ const t=setTimeout(()=>{ setPhase('idle'); setAnimating(false); setPending(null); },420); return()=>clearTimeout(t); }
  },[phase,pendingStack]);

  const zoomIn = useCallback((node)=>{ if(current.depth>=1) return; navigate([...stack,{id:node.id,title:node.title,depth:current.depth+1}]); },[stack,current,navigate]);
  const zoomTo = useCallback((idx)=>{ if(idx===stack.length-1) return; navigate(stack.slice(0,idx+1)); },[stack,navigate]);

  const updateNode = useCallback((layer,parentId,updated)=>{
    setData(d=>{
      if(layer==='dream')    return{...d,dream:updated};
      if(layer==='projects') return{...d,projects:(d.projects||[]).map(n=>n.id===updated.id?updated:n)};
      if(layer==='actions')  return{...d,actions:{...d.actions,[parentId]:(d.actions[parentId]||[]).map(n=>n.id===updated.id?updated:n)}};
      return d;
    });
    setStack(s=>s.map(item=>item.id===updated.id?{...item,title:updated.title}:item));
  },[setData]);

  const deleteNode = useCallback((layer,parentId,id)=>{
    setData(d=>{
      if(layer==='projects') return{...d,projects:(d.projects||[]).filter(n=>n.id!==id)};
      if(layer==='actions')  return{...d,actions:{...d.actions,[parentId]:(d.actions[parentId]||[]).filter(n=>n.id!==id)}};
      return d;
    });
    setStack(s=>{ const i=s.findIndex(item=>item.id===id); return i>-1?s.slice(0,i):s; });
  },[setData]);

  const addNode = useCallback((layer,parentId)=>{
    const n = layer==='actions' ? makeAction('新節點') : {...makeNode('新節點'),owner:'us',status:'todo'};
    setData(d=>{
      if(layer==='projects') return{...d,projects:[...(d.projects||[]),n]};
      if(layer==='actions')  return{...d,actions:{...d.actions,[parentId]:[...(d.actions[parentId]||[]),n]}};
      return d;
    });
    setTimeout(()=>setEditTarget({node:n,layer,parentId}),50);
  },[setData]);

  const currentLayer = current.depth===0?'projects':'actions';

  return (
    <div style={{flex:1,position:'relative',display:'flex',flexDirection:'column',fontFamily:"'Noto Sans TC','PingFang TC',system-ui,sans-serif",overflow:'hidden',userSelect:'none'}}>
      {/* Top breadcrumb */}
      <div style={{padding:'18px 24px 0',display:'flex',alignItems:'center',gap:6,minHeight:44,flexShrink:0}}>
        {stack.map((s,i)=>(
          <span key={s.id+i} style={{display:'flex',alignItems:'center',gap:6}}>
            {i>0&&<span style={{color:'#C8C0B4',fontSize:13}}>›</span>}
            <button onClick={()=>zoomTo(i)} style={{background:'none',border:'none',padding:'2px 4px',cursor:i===stack.length-1?'default':'pointer',fontSize:13,fontFamily:'inherit',color:i===stack.length-1?'#3D3830':'#A09688',fontWeight:i===stack.length-1?500:400,transition:'color .15s'}} onMouseEnter={e=>{if(i<stack.length-1)e.target.style.color='#2D4A3E'}} onMouseLeave={e=>{if(i<stack.length-1)e.target.style.color='#A09688'}}>{s.title}</button>
          </span>
        ))}
        {depthLabel&&<span style={{marginLeft:8,fontSize:10,letterSpacing:'.12em',color:'#A09688',textTransform:'uppercase',padding:'3px 10px',border:'1px solid #DDD8D0',borderRadius:20,background:'rgba(255,255,255,.7)'}}>{depthLabel}</span>}
        <div style={{marginLeft:'auto'}}>
          <button onClick={()=>setEditTarget({node:data.dream,layer:'dream',parentId:null})} style={{background:'none',border:'1.5px solid #E0D9CF',borderRadius:20,padding:'4px 14px',fontSize:11,color:'#A09688',cursor:'pointer',fontFamily:'inherit',letterSpacing:'.06em',transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='#2D4A3E';e.currentTarget.style.color='#2D4A3E'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#E0D9CF';e.currentTarget.style.color='#A09688'}}>編輯夢想</button>
        </div>
      </div>

      {/* Map */}
      <div style={{flex:1,position:'relative'}}>
        <div className={`phase-${phase}`} style={{position:'absolute',inset:0}}>
          <svg className="svg-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
            {slots.map((node,i)=>{
              const pos=positions[i];
              // gentle arc: control point perpendicular offset
              const mx=(50+pos.x)/2+(pos.y-50)*0.12;
              const my=(50+pos.y)/2-(pos.x-50)*0.12;
              const owner=node?._owner||node?.owner||node?.assignee;
              const stroke=node?(owner==='apple'?'rgba(232,149,109,.45)':owner==='pine'?'rgba(45,74,62,.38)':'rgba(139,123,175,.38)'):'rgba(210,205,195,.5)';
              return(
                <path key={i}
                  d={`M 50 50 Q ${mx} ${my} ${pos.x} ${pos.y}`}
                  stroke={stroke} strokeWidth={node?'0.7':'0.35'}
                  fill="none" strokeDasharray={node?'none':'2 6'}
                  opacity={node?0.7:0.3}/>
              );
            })}
          </svg>
          <div className="node-center">
            <div className="dem-breathe" style={{width:148,height:148,borderRadius:'50%',background:'linear-gradient(135deg,#2D4A3E 0%,#3A5F4E 100%)',display:'flex',alignItems:'center',justifyContent:'center',cursor:stack.length>1?'pointer':'default',position:'relative',overflow:'hidden',transition:'transform .2s'}} onClick={()=>stack.length>1&&zoomTo(stack.length-2)}>
              {/* Show dream image subtly in center if available */}
              {stack.length===1&&data.dream.image&&<img src={data.dream.image} alt="" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',opacity:.15}} onError={()=>{}} />}
              <span style={{fontFamily:"'Noto Serif TC',serif",fontSize:current.title.length>7?12:14,fontWeight:400,color:'#F8F6F1',textAlign:'center',lineHeight:1.7,letterSpacing:'.05em',padding:'0 18px',position:'relative'}}>{current.title}</span>
            </div>
            {stack.length>1&&<div style={{textAlign:'center',marginTop:8,fontSize:10,color:'#C0B8AE',letterSpacing:'.06em'}}>點擊返回</div>}
          </div>
          {slots.map((node,i)=>{const pos=positions[i];return(<OrbitNode key={node?node.id:'empty_'+i} node={node} pos={pos} delay={phase==='enter'?i*25:0} isPlaceholder={!node} onZoomIn={()=>node?zoomIn(node):addNode(currentLayer,current.id)} onEdit={()=>node&&setEditTarget({node,layer:currentLayer,parentId:current.id})}/>);})}
        </div>
      </div>

      {stack.length===1&&phase==='idle'&&<div style={{textAlign:'center',padding:'0 0 16px',fontSize:11,color:'#C8C0B4',letterSpacing:'.08em',flexShrink:0}}>點擊節點展開 · 點右上角 ✎ 進行編輯</div>}

      {editTarget&&(
        <EditDialog node={editTarget.node} layer={editTarget.layer} onSave={u=>updateNode(editTarget.layer,editTarget.parentId,u)} onDelete={id=>deleteNode(editTarget.layer,editTarget.parentId,id)} onClose={()=>setEditTarget(null)} support={support} onSupportChange={onSupportChange} />
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   HOME PAGE
════════════════════════════════════════════════════════ */
function HomePage({ demData, calEvents, todayStatus, setTodayStatus, setPage, onJumpProject }) {
  const today   = todayKey();
  const weekEnd = new Date(); weekEnd.setDate(weekEnd.getDate()+7);
  const weekStr = weekEnd.toISOString().slice(0,10);

  const todayEvs    = calEvents.filter(e=>e.date===today);
  const next30End = (()=>{ const d=new Date(); d.setDate(d.getDate()+30); return d.toISOString().slice(0,10); })();
  const next30Evs = calEvents.filter(e=>e.date>=today&&e.date<=next30End).sort((a,b)=>a.date.localeCompare(b.date));
  const upcomingEvs = calEvents.filter(e=>e.date>today&&e.date<=weekStr).sort((a,b)=>a.date.localeCompare(b.date));

  const allActions = useMemo(()=>{
    const r=[];
    (demData.projects||[]).forEach(proj=>{
      (demData.actions[proj.id]||[]).forEach(a=>{
        r.push({...a,domainTitle:proj.title,projectTitle:proj.title});
      });
    });
    return r;
  },[demData]);

  const weekCounts = {
    todo:  allActions.filter(a=>a.status==='todo').length,
    doing: allActions.filter(a=>a.status==='doing').length,
    done:  allActions.filter(a=>a.status==='done').length,
  };
  const recentDone = allActions.filter(a=>a.status==='done').sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||'')).slice(0,3);

  // Domain cards grouped by owner
  const projectsByOwner = useMemo(()=>{
    const groups = { apple:[], pine:[], us:[] };
    (demData.projects||[]).forEach(proj=>{
      const o = proj.owner||'us';
      if (groups[o]) groups[o].push(proj);
    });
    return groups;
  },[demData]);

  function SectionHeader({ emoji, label, action }) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:9}}>
        <p style={{fontSize:12,fontWeight:500,color:'#2D2820',display:'flex',alignItems:'center',gap:5}}>
          <span>{emoji}</span>{label}
        </p>
        {action}
      </div>
    );
  }

  return (
    <div className="page-scroll">
      <div style={{padding:'18px 22px 48px',maxWidth:860,margin:'0 auto'}}>

        {/* ── Header ── */}
        <div style={{marginBottom:18}}>
          <p style={{fontSize:10,color:'#A09688',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:2}}>{todayLabel()}</p>
          <h1 style={{fontFamily:"'Noto Serif TC',serif",fontSize:19,fontWeight:400,color:'#2D2820'}}>早安，蘋果派 & 松果 ✦</h1>
        </div>

        {/* ── 今日狀態 ── */}
        <div style={{marginBottom:18}}>
          <SectionHeader emoji="✨" label="今日狀態" />
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[APPLE,PINE].map(p=>{
              const st=todayStatus[p.key], isHigh=st.stress==='high';
              const evs=todayEvs.filter(e=>e.owner===p.key||e.owner==='us');
              return (
                <div key={p.key} className="card" style={{padding:'12px 14px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:7}}>
                    <span style={{fontSize:16,lineHeight:1}}>{p.key==='apple'?'🍎':'🌲'}</span>
                    <span style={{fontSize:12,fontWeight:500,color:'#2D2820'}}>{p.name}</span>
                    <span style={{marginLeft:'auto',fontSize:10,padding:'1px 6px',borderRadius:9,background:isHigh?'rgba(192,136,122,.12)':'rgba(91,163,123,.12)',color:isHigh?'#C0887A':'#5BA37B'}}>{isHigh?'🔴 高壓':'● 一般'}</span>
                  </div>
                  {evs.length===0?<p style={{fontSize:11,color:'#C0B8AE'}}>今天沒有安排</p>
                    :evs.slice(0,2).map(e=><p key={e.id} style={{fontSize:11,color:'#7D7468',marginBottom:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>· {e.title}</p>)}
                  <button onClick={()=>setTodayStatus(p.key,'stress',isHigh?'normal':'high')}
                    style={{marginTop:8,fontSize:9,padding:'2px 7px',borderRadius:8,border:`1px solid ${isHigh?'#C0887A':'#E0D9CF'}`,background:'none',color:isHigh?'#C0887A':'#A09688',cursor:'pointer'}}>
                    {isHigh?'切換為一般':'標記高壓'}
                  </button>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── 本週共同待辦 ── */}

function CalendarPage({ calEvents, setCalEvents }) {
  const now = new Date();
  const [year, setYear]   = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [selDay, setSelDay] = useState(null);

  function changeMonth(d) { let m=month+d,y=year; if(m<0){m=11;y--;} if(m>11){m=0;y++;} setMonth(m);setYear(y); }
  const cells = monthGrid(year,month);
  const today = todayKey();

  return (
    <div className="page-scroll">
      <div style={{padding:'20px 28px 40px',maxWidth:720,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
          <button onClick={()=>changeMonth(-1)} style={{background:'none',border:'1.5px solid #E0D9CF',borderRadius:9,padding:'6px 12px',cursor:'pointer',color:'#7D7468',fontSize:16}}>‹</button>
          <h2 style={{fontFamily:"'Noto Serif TC',serif",fontSize:18,fontWeight:400,color:'#2D2820'}}>{year} 年 {MONTHS[month]}</h2>
          <button onClick={()=>changeMonth(1)} style={{background:'none',border:'1.5px solid #E0D9CF',borderRadius:9,padding:'6px 12px',cursor:'pointer',color:'#7D7468',fontSize:16}}>›</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',textAlign:'center',marginBottom:6}}>
          {DAYS.map(d=><div key={d} style={{fontSize:11,color:'#A09688',padding:'3px 0'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
          {cells.map((day,i)=>{
            if(!day) return <div key={i}></div>;
            const dk=toKey(year,month,day);
            const evs=calEvents.filter(e=>e.date===dk);
            const isToday=dk===today;
            const hasHigh=evs.some(e=>e.stress==='high');
            return (
              <button key={i} onClick={()=>setSelDay(dk)}
                style={{
                  minHeight:64,borderRadius:9,
                  border:`1.5px solid ${isToday?'#2D4A3E':hasHigh?'rgba(192,136,122,.4)':'rgba(180,172,160,.3)'}`,
                  background:isToday?'rgba(45,74,62,.06)':'rgba(255,255,255,.7)',
                  display:'flex',flexDirection:'column',alignItems:'flex-start',
                  padding:'4px 5px 4px',cursor:'pointer',transition:'all .15s',
                  textAlign:'left',
                }}>
                <span style={{fontSize:11,fontWeight:isToday?700:400,color:isToday?'#2D4A3E':'#3D3830',marginBottom:2,width:'100%',textAlign:'center'}}>
                  {day}
                </span>
                <div style={{display:'flex',flexDirection:'column',gap:1,width:'100%'}}>
                  {evs.slice(0,2).map(e=>{
                    const em=e.owner==='apple'?'🍎':e.owner==='pine'?'🌲':'🤝';
                    const stress=e.stress==='high'?'🔴':'';
                    return (
                      <span key={e.id} style={{fontSize:9,lineHeight:1.4,color:'#3D3830',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:1}}>
                        <span style={{flexShrink:0}}>{em}{stress}</span>
                        <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,fontSize:9}}>{e.title}</span>
                      </span>
                    );
                  })}
                  {evs.length>2&&(
                    <span style={{fontSize:8,color:'#A09688',lineHeight:1.4}}>+{evs.length-2}</span>

        </div>
        <div style={{marginTop:14,padding:'11px 14px',background:'rgba(255,255,255,.65)',borderRadius:11,border:'1px solid rgba(180,172,160,.3)'}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:6,alignItems:'center'}}>
            <span style={{fontSize:10,color:'#A09688',fontWeight:500,letterSpacing:'.04em'}}>身份</span>
            {[{e:'🍎',l:'蘋果派'},{e:'🌲',l:'松果'},{e:'🤝',l:'我們'}].map(p=>(
              <span key={p.e} style={{fontSize:11,color:'#7D7468'}}>{p.e} {p.l}</span>
            ))}
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:10,alignItems:'center'}}>
            <span style={{fontSize:10,color:'#A09688',fontWeight:500,letterSpacing:'.04em'}}>壓力</span>

/* EventForm lives outside DayModal so it never remounts on parent re-render — this fixes the IME bug */
function EventForm({ form, setForm, onSave, onCancel, saveLabel }) {
  return (
    <div style={{border:'1.5px solid #E0D9CF',borderRadius:11,padding:14,display:'flex',flexDirection:'column',gap:10,background:'rgba(255,255,255,.8)'}}>
      <input
        value={form.title}
        onChange={e=>setForm(f=>({...f,title:e.target.value}))}
        placeholder="事件標題"
        autoFocus
      />
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
        <input type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} />
        <select value={form.owner} onChange={e=>setForm(f=>({...f,owner:e.target.value}))}>
          <option value="apple">🍎 蘋果派</option>
          <option value="pine">🌲 松果</option>
          <option value="us">🤝 我們</option>
        </select>
      </div>
      <select value={form.stress} onChange={e=>setForm(f=>({...f,stress:e.target.value}))}>
        <option value="normal">一般</option>
        <option value="high">🔴 高壓日</option>
      </select>
      <input
        value={form.tags}
        onChange={e=>setForm(f=>({...f,tags:e.target.value}))}
        placeholder="標籤（逗號分隔，如：出差,不回家,約會）"
      />
      <input
        value={form.note}
        onChange={e=>setForm(f=>({...f,note:e.target.value}))}
        placeholder="備註（選填）"
      />
      <div style={{display:'flex',gap:8}}>
        <button onClick={onSave} className="btn-primary" style={{flex:1}}>{saveLabel||'儲存'}</button>
        <button onClick={onCancel} className="btn-ghost">取消</button>
      </div>
    </div>
  );
}

function DayModal({ dateKey, events, setEvents, onClose }) {
  const [editId,   setEditId]  = useState(null);
  const [showAdd,  setShowAdd] = useState(false);
  const emptyForm = { title:'', time:'19:00', owner:'us', stress:'normal', tags:'', note:'' };
  const [form, setForm] = useState(emptyForm);

  const dayEvs = events.filter(e=>e.date===dateKey).sort((a,b)=>a.time.localeCompare(b.time));

  function startEdit(ev) {
    setEditId(ev.id);
    setForm({ title:ev.title, time:ev.time, owner:ev.owner, stress:ev.stress, tags:(ev.tags||[]).join(','), note:ev.note||'' });
    setShowAdd(false);
  }
  function startAdd() {
    setEditId(null); setForm(emptyForm); setShowAdd(true);
  }
  function formToEvent(f) {
    return { title:f.title.trim(), time:f.time, owner:f.owner, stress:f.stress, tags:f.tags.split(',').map(t=>t.trim()).filter(Boolean), note:f.note };
  }
  function saveEdit() {
    if (!form.title.trim()) return;
    setEvents(prev=>prev.map(e=>e.id===editId ? {...e,...formToEvent(form)} : e));
    setEditId(null);
  }
  function saveAdd() {
    if (!form.title.trim()) return;
    setEvents(prev=>[...prev, {id:uid(), date:dateKey, ...formToEvent(form)}]);
    setForm(emptyForm); setShowAdd(false);
  }
  function deleteEvent(id) {
    if (window.confirm('確定要刪除這個事件嗎？')) {
      setEvents(prev=>prev.filter(e=>e.id!==id));
      if (editId===id) setEditId(null);
    }
  }

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:100,background:'rgba(45,40,35,.22)',backdropFilter:'blur(6px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#FDFAF5',borderRadius:'20px 20px 0 0',padding:'22px',width:'100%',maxWidth:460,maxHeight:'85vh',overflowY:'auto',animation:'dialogIn .2s both'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
          <h3 style={{fontSize:15,fontWeight:500,color:'#2D2820'}}>{dateKey}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,color:'#A09688',cursor:'pointer'}}>×</button>
        </div>

        {dayEvs.length===0&&!showAdd&&!editId&&<p style={{fontSize:13,color:'#C0B8AE',textAlign:'center',padding:'14px 0'}}>這天還沒有事件</p>}

        <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:14}}>
          {dayEvs.map(ev=>{
            const p=PEOPLE[ev.owner]||PEOPLE.us;
            if (editId===ev.id) {
              return (
                <div key={ev.id}>
                  <p style={{fontSize:11,color:'#A09688',marginBottom:6}}>✎ 編輯事件</p>
                  <EventForm form={form} setForm={setForm} onSave={saveEdit} onCancel={()=>setEditId(null)} saveLabel="更新" />
                </div>
              );
            }
            return (
              <div key={ev.id} style={{background:'rgba(255,255,255,.8)',border:'1.5px solid #E0D9CF',borderRadius:11,padding:'11px 13px'}}>
                <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
                  <span style={{fontSize:14,flexShrink:0,marginTop:1}}>{p===PEOPLE.apple?'🍎':p===PEOPLE.pine?'🌲':'🤝'}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:13,fontWeight:500,color:'#2D2820'}}>{ev.title}</p>
                    <p style={{fontSize:11,color:'#A09688',marginTop:2}}>
                      {ev.time} · {p.name}
                      {ev.stress==='high'?' · 🔴 高壓':''}
                      {ev.tags?.length?' · '+ev.tags.join('、'):''}
                    </p>
                    {ev.note&&<p style={{fontSize:11,color:'#7D7468',marginTop:2}}>{ev.note}</p>}
                  </div>
                  <div style={{display:'flex',gap:4,flexShrink:0}}>
                    <button onClick={()=>startEdit(ev)} style={{background:'none',border:'1px solid #E0D9CF',borderRadius:7,padding:'3px 8px',fontSize:11,color:'#A09688',cursor:'pointer'}}>編輯</button>
                    <button onClick={()=>deleteEvent(ev.id)} style={{background:'none',border:'1px solid rgba(192,136,122,.3)',borderRadius:7,padding:'3px 8px',fontSize:11,color:'#C0887A',cursor:'pointer'}}>刪除</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {showAdd
          ? <EventForm form={form} setForm={setForm} onSave={saveAdd} onCancel={()=>setShowAdd(false)} saveLabel="新增事件" />
          : <button onClick={startAdd} style={{width:'100%',background:'none',border:'1.5px dashed #D8D0C4',borderRadius:11,padding:'11px',fontSize:13,color:'#A09688',cursor:'pointer'}}>＋ 新增事件</button>}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   PROJECT HELPERS
════════════════════════════════════════════════════════ */
function getProjectStats(projectId, demData) {
  const acts  = demData.actions[projectId] || [];
  const total = acts.length;
  const done  = acts.filter(a => a.status === 'done').length;
  const next  = acts.find(a => a.status !== 'done') || null;
  return { total, done, next };
}

function flattenProjects(demData) {
  return (demData.projects||[]).map(p => ({
    ...p,
    domainId:    p.id,
    domainTitle: p.title,
    status:      p.status||'todo',
    owner:       p.owner||'us',
  }));
}


function updateProjectInDem(setDemData, projectId, updates) {
  setDemData(d => ({
    ...d,
    projects: (d.projects||[]).map(p => p.id===projectId ? {...p,...updates} : p),
  }));
}

/* ════════════════════════════════════════════════════════
   PROJECT DETAIL MODAL
════════════════════════════════════════════════════════ */
function ProjectDetailModal({ project, demData, setDemData, onClose }) {
  const [form, setForm] = useState({
    title:  project.title,
    desc:   project.desc  || '',
    owner:  project.owner || 'us',
    dueDate:project.dueDate || '',
    status: project.status || 'todo',
  });
  const [newAction, setNewAction] = useState('');
  const actions = demData.actions[project.id] || [];
  const { total, done } = getProjectStats(project.id, demData);
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const todoActs = actions.filter(a => a.status !== 'done');
  const doneActs = actions.filter(a => a.status === 'done');

  function save() {
    if (!form.title.trim()) return;
    updateProjectInDem(setDemData, project.id, {
      title: form.title.trim(), desc: form.desc,
      owner: form.owner, dueDate: form.dueDate, status: form.status,
    });
    onClose();
  }
  function addAction() {
    if (!newAction.trim()) return;
    setDemData(d => ({
      ...d,
      actions: { ...d.actions, [project.id]: [...(d.actions[project.id]||[]), makeAction(newAction.trim())] },
    }));
    setNewAction('');
  }
  function toggleAction(id) {
    setDemData(d => ({
      ...d,
      actions: {
        ...d.actions,
        [project.id]: (d.actions[project.id]||[]).map(a =>
          a.id === id ? { ...a, status: a.status==='done'?'todo':'done', completedAt: a.status!=='done'?todayKey():null } : a
        ),
      },
    }));
  }
  function deleteAction(id) {
    setDemData(d => ({
      ...d,
      actions: { ...d.actions, [project.id]: (d.actions[project.id]||[]).filter(a => a.id!==id) },
    }));
  }
  function deleteProject() {
    if (!window.confirm('確定要刪除這個專案嗎？')) return;
    setDemData(d => ({
      ...d,
      projects: (d.projects||[]).filter(p => p.id!==project.id),
    }));
    onClose();
  }

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:100,background:'rgba(45,40,35,.25)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>

   ACTION HELPERS (for Kanban)

function flattenActions(demData) {
  const r = [];
  (demData.projects||[]).forEach(proj => {
    (demData.actions[proj.id]||[]).forEach(a => {
      r.push({
        ...a,
        domainId:     proj.id,
        domainTitle:  proj.title,
        projectId:    proj.id,
        projectTitle: proj.title,
        projectOwner: proj.owner||'us',
      });
    });
  });
  return r;
}


function updateActionInDem(setDemData, projectId, actionId, updates) {
  setDemData(d => ({
    ...d,
    actions: {
      ...d.actions,
      [projectId]: (d.actions[projectId]||[]).map(a =>
        a.id === actionId ? {...a,...updates} : a
      ),
    },
  }));
}

/* ── Projects Page (Action Kanban) ── */
function ProjectsPage({ demData, setDemData }) {
  const [filterDomain,  setFilterDomain]  = useState('all');
  const [filterOwner,   setFilterOwner]   = useState('all');
  const [draggingId,    setDraggingId]    = useState(null);
  const [dragOver,      setDragOver]      = useState(null);
  const [editAction,    setEditAction]    = useState(null);
  const [isMobile,      setIsMobile]      = useState(typeof window!=='undefined'&&window.innerWidth<640);
  const [showAdd,       setShowAdd]       = useState(false);
  const [newTitle,      setNewTitle]      = useState('');
  const [newProjectId,  setNewProjectId]  = useState('');

  useEffect(()=>{
    const fn=()=>setIsMobile(window.innerWidth<640);
    window.addEventListener('resize',fn);
    return()=>window.removeEventListener('resize',fn);
  },[]);

  const allActions = useMemo(()=>flattenActions(demData),[demData]);
  const filtered   = allActions.filter(a=>{
    if (filterDomain!=='all'&&a.domainId!==filterDomain) return false;
    if (filterOwner !=='all'&&(a.assignee||'us')!==filterOwner) return false;
    return true;
  });

  const cols = {
    todo:  filtered.filter(a=>(a.status||'todo')==='todo'),
    doing: filtered.filter(a=>(a.status||'todo')==='doing'),
    done:  filtered.filter(a=>(a.status||'todo')==='done'),
  };

  function changeStatus(action, status) {
    updateActionInDem(setDemData, action.projectId, action.id, {
      status,
      completedAt: status==='done' ? todayKey() : null,
    });
  }

  function handleDrop(status) {
    if (!draggingId) return;
    const act = allActions.find(a=>a.id===draggingId);
    if (act) changeStatus(act, status);
    setDraggingId(null); setDragOver(null);
  }

  function saveEditedAction(updated) {
    updateActionInDem(setDemData, updated.projectId, updated.id, {
      title: updated.title, desc: updated.desc,
      assignee: updated.assignee, dueDate: updated.dueDate,
      status: updated.status,
      completedAt: updated.status==='done'?(updated.completedAt||todayKey()):null,
    });
  }

  function deleteAction(action) {
    if (!window.confirm('確定刪除這個行動嗎？')) return;
    setDemData(d=>({
      ...d,
      actions:{...d.actions,[action.projectId]:(d.actions[action.projectId]||[]).filter(a=>a.id!==action.id)},
    }));
    setEditAction(null);
  }

  function addAction() {
    if (!newTitle.trim()||!newProjectId) return;
    const a = makeAction(newTitle.trim());
    setDemData(d=>({...d,actions:{...d.actions,[newProjectId]:[...(d.actions[newProjectId]||[]),a]}}));
    setNewTitle(''); setShowAdd(false);
  }

  // Flat project list for add dropdown
  const allProjects = useMemo(()=>flattenProjects(demData),[demData]);

  const colDef = [
    { key:'todo',  label:'待開始', accent:'#A09688', borderTop:'2px solid rgba(160,150,136,.5)' },
    { key:'doing', label:'進行中', accent:'#C07040', borderTop:'2px solid rgba(232,149,109,.6)' },
    { key:'done',  label:'已完成', accent:'#2D4A3E', borderTop:'2px solid rgba(45,74,62,.5)'    },
  ];

  const FilterBar = ()=>(
    <div style={{padding:'11px 14px',borderBottom:'1px solid #EDE8E0',flexShrink:0,display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
      <span style={{fontFamily:"'Noto Serif TC',serif",fontSize:15,fontWeight:400,color:'#2D2820',marginRight:4}}>行動看板</span>
      <select value={filterDomain} onChange={e=>setFilterDomain(e.target.value)} style={{fontSize:11,padding:'3px 7px',borderRadius:7,border:'1px solid #E0D9CF',background:'#FFF',cursor:'pointer'}}>
        <option value="all">所有專案</option>
        {(demData.projects||[]).map(p=><option key={p.id} value={p.id}>{p.title}</option>)}
      </select>
      <select value={filterOwner} onChange={e=>setFilterOwner(e.target.value)} style={{fontSize:11,padding:'3px 7px',borderRadius:7,border:'1px solid #E0D9CF',background:'#FFF',cursor:'pointer'}}>
        <option value="all">所有人</option>
        <option value="apple">🍎 蘋果派</option>
        <option value="pine">🌲 松果</option>
        <option value="us">🤝 我們</option>
      </select>
      <span style={{marginLeft:'auto',fontSize:10,color:'#A09688'}}>{filtered.length} 個行動</span>
      <button onClick={()=>setShowAdd(s=>!s)} style={{background:'#2D4A3E',color:'#F8F6F1',border:'none',borderRadius:7,padding:'4px 10px',fontSize:11,cursor:'pointer'}}>＋ 新增</button>
    </div>
  );

  const AddRow = ()=> showAdd ? (
    <div style={{padding:'9px 14px',borderBottom:'1px solid #EDE8E0',background:'rgba(45,74,62,.04)',flexShrink:0,display:'flex',gap:7,alignItems:'center',flexWrap:'wrap'}}>
      <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addAction()} placeholder="行動名稱…" autoFocus
        style={{fontSize:12,padding:'5px 9px',borderRadius:7,border:'1px solid #E0D9CF',flex:1,minWidth:100,fontFamily:'inherit'}} />
      <select value={newProjectId} onChange={e=>setNewProjectId(e.target.value)} style={{fontSize:11,padding:'5px 7px',borderRadius:7,border:'1px solid #E0D9CF',background:'#FFF'}}>
