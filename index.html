/* ================================================================
   Google Sheets / Drive API
   ================================================================ */

const IS_CONFIGURED = APPS_SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE';

async function apiGet(params) {
  const url = new URL(APPS_SCRIPT_URL);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  const text = await res.text();
  return JSON.parse(text);
}

async function apiPost(body) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(body),
    redirect: 'follow',
  });
  const text = await res.text();
  return JSON.parse(text);
}

async function loadAllData() {
  const result = await apiGet({ action: 'getData' });
  if (result.ok) return result.data;
  throw new Error(result.error || '讀取失敗');
}

async function saveToSheets(key, value) {
  await apiPost({ action: 'saveData', key, value });
}

async function uploadImageToDrive(dataUrl) {
  const [header, base64] = dataUrl.split(',');
  const mimeType = header.match(/:(.*?);/)[1];
  const filename  = 'dream-' + Date.now() + '.' + mimeType.split('/')[1];
  const result = await apiPost({ action: 'uploadImage', filename, base64, mimeType });
  if (result.ok) return result.url;
  throw new Error(result.error || '圖片上傳失敗');
}

/* ================================================================
   工具函式
   ================================================================ */

function nextTaskStatus(s) { const i = TASK_STATUSES.indexOf(s); return TASK_STATUSES[(i+1)%3]; }

function getBreadcrumb(task, projects, dreams) {
  const project = projects.find(p => p.id === task.projectId) || null;
  const dream   = project ? dreams.find(d => d.id === project.dreamId) || null : null;
  return { project, dream };
}

function getDreamProgress(dreamId, projects, tasks, dreams) {
  const pids = projects.filter(p => p.dreamId === dreamId).map(p => p.id);
  const ts   = tasks.filter(t => pids.includes(t.projectId));
  if (!ts.length) {
    const map = { '萌芽中':10,'探索中':25,'發展中':50,'穩定進行':75,'已實現':100,'暫停':30 };
    const d = dreams.find(d => d.id === dreamId);
    return map[d && d.status] || 0;
  }
  return Math.round(ts.filter(t => t.status === '已完成').length / ts.length * 100);
}

function getMonthGrid(year, month) {
  const first = new Date(year, month, 1).getDay();
  const days  = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < first; i++) cells.push(null);
  for (let d = 1; d <= days; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  return cells;
}

function toDateKey(year, month, day) {
  return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function getTodayKey() {
  const d = new Date();
  return toDateKey(d.getFullYear(), d.getMonth(), d.getDate());
}

function getTodayLabel() {
  const d = new Date();
  const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日・${days[d.getDay()]}`;
}

  const [failed, setFailed] = useState(false);
  useEffect(() => { setFailed(false); }, [image]);
  if (image && !failed) return <img src={image} alt="" className="w-full h-full object-cover" onError={() => setFailed(true)} />;
  return (
    <div className="w-full h-full flex flex-col items-center justify-center bg-stone-100">
      <Icon name="Sparkles" size={18} className="text-stone-300" />
      <span className="text-[10px] text-stone-300 mt-1 px-2 text-center">{failed ? '圖片無法載入' : '尚未加入圖片'}</span>
    </div>
  );
}

function ImageUploadField({ value, onChange }) {
  const [warning, setWarning] = useState('');
  const [uploading, setUploading] = useState(false);

  function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { setWarning('照片超過 10MB，請選小一點的'); return; }
    setWarning(''); setUploading(true);
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const url = await uploadImageToDrive(reader.result);
        onChange(url);
      } catch (err) {
        setWarning('上傳失敗：' + err.message);
      } finally { setUploading(false); }
    };
    reader.onerror = () => { setWarning('讀取照片失敗，請再試一次'); setUploading(false); };
    reader.readAsDataURL(file);
  }

  return (
    <div className="space-y-2">
      <label className={`block text-sm border border-dashed border-stone-300 rounded-lg px-2.5 py-2 text-stone-500 text-center ${uploading ? 'opacity-60' : 'cursor-pointer hover:bg-stone-50'}`}>
        {uploading ? '上傳至 Google Drive 中...' : '📷 從手機／電腦上傳照片'}
        <input type="file" accept="image/*" className="hidden" onChange={handleFile} disabled={uploading} />
      </label>
      {warning && <p className="text-xs text-rose-500">{warning}</p>}
      {value && (
        <div className="relative h-24 rounded-lg overflow-hidden border border-stone-200">
          <DreamThumbnail image={value} />
          <button type="button" onClick={() => onChange('')} className="absolute top-1 right-1 bg-white/90 rounded-full p-1"><Icon name="X" size={12} /></button>
        </div>
      )}
    </div>
  );
}

function CalendarView({ events, year, month, setYear, setMonth, openDay }) {

  return (

  function saveEdit() { if (!editTitle.trim()) return; onUpdateProject(project.id, { title: editTitle.trim(), owner: editOwner }); setIsEditing(false); }
  return (
    <div>
      {isEditing
        ? (
          <div className="space-y-1.5 mb-2">
            <input value={editTitle} onChange={e => setEditTitle(e.target.value)} className="w-full text-sm border border-stone-200 rounded-lg px-2 py-1" />
            <div className="flex gap-2 items-center">
              <IdentitySelect value={editOwner} onChange={setEditOwner} />
              <button onClick={saveEdit} className="text-xs bg-amber-500 text-white rounded-lg px-2.5 py-1.5">儲存</button>
              <button onClick={() => setIsEditing(false)} className="text-xs text-stone-400">取消</button>
            </div>
          </div>
        ) : (
          <div className="flex items-center justify-between mb-1.5 gap-2">
            <p className="text-sm font-semibold text-stone-700 flex items-center gap-1.5 min-w-0">
              <Icon name="FolderOpen" size={13} className="text-stone-400 flex-shrink-0" />
              <span className="truncate">{project.title}</span>
              <IdentityBadge owner={project.owner} />
            </p>
            <div className="flex items-center gap-1 flex-shrink-0">
              <button onClick={() => { setEditTitle(project.title); setEditOwner(project.owner); setIsEditing(true); }} className="text-stone-300 hover:text-stone-600 p-0.5"><Icon name="Pencil" size={12} /></button>
              <DeleteConfirmButton onConfirm={() => onDeleteProject(project.id)} label="" className="text-stone-300 hover:text-rose-500 p-0.5" />
            </div>
          </div>
        )}
      <div className="space-y-1 ml-1">
        {projTasks.map(t => (
          <div key={t.id} className="flex items-center justify-between gap-2">
            <button onClick={() => onOpenTask(t.id)} className="text-sm text-stone-600 truncate text-left hover:text-stone-900">{t.title}</button>
            <TaskStatusPill status={t.status} onClick={() => cycleTask(t.id)} />
          </div>
        ))}
        {projTasks.length === 0 && !adding && <p className="text-xs text-stone-300">尚無行動項目</p>}
        {adding
          ? <div className="flex gap-1 mt-1"><input value={newTitle} onChange={e => setNewTitle(e.target.value)} placeholder="新增行動項目..." className="flex-1 text-xs border border-stone-200 rounded-lg px-2 py-1" /><button onClick={submitAdd} className="text-xs bg-amber-500 text-white rounded-lg px-2">加入</button></div>
          : <button onClick={() => setAdding(true)} className="text-xs text-amber-600 flex items-center gap-0.5 mt-1"><Icon name="Plus" size={11} />新增行動項目</button>}
      </div>
    </div>
  );
}

function DreamDetailModal({ dream, projects, tasks, support, onClose, cycleTask, goToKanban, onAddSupportReceived, onAddSupportNeeded, onUpdateDream, onDeleteDream, onAddProject, onDeleteProject, onUpdateProject, onAddTask, openTask }) {
  const [isEditing, setIsEditing] = useState(false);
  const [form, setForm] = useState({ title: dream.title, description: dream.description, why: dream.why, image: dream.image, owner: dream.owner, status: dream.status });
  const [supportNote, setSupportNote] = useState('');
  const [neededNote, setNeededNote] = useState('');
  const [addingProject, setAddingProject] = useState(false);
  const [newProjTitle, setNewProjTitle] = useState('');
  const [newProjOwner, setNewProjOwner] = useState(dream.owner);
  const dreamProjects = projects.filter(p => p.dreamId === dream.id);
  const sup = support[dream.id] || { needed: [], received: [] };
  const progress = getDreamProgress(dream.id, projects, tasks, [dream]);

  function saveEdit() { if (!form.title.trim()) return; onUpdateDream(dream.id, { ...form, title: form.title.trim() }); setIsEditing(false); }
  function submitRecv() { if (!supportNote.trim()) return; onAddSupportReceived(dream.id, supportNote.trim()); setSupportNote(''); }
  function submitNeeded() { if (!neededNote.trim()) return; onAddSupportNeeded(dream.id, neededNote.trim()); setNeededNote(''); }
  function submitProject() { if (!newProjTitle.trim()) return; onAddProject(dream.id, newProjTitle.trim(), newProjOwner); setNewProjTitle(''); setAddingProject(false); }

  return (
    <ModalShell onClose={onClose}>
      <div className="relative">
        <div className="rounded-t-3xl sm:rounded-t-2xl overflow-hidden h-52">
          <DreamThumbnail image={isEditing ? form.image : dream.image} />
        </div>
        <button onClick={onClose} className="absolute top-3 right-3 bg-white/90 rounded-full p-1.5"><Icon name="X" size={16} /></button>
      </div>
      <div className="p-5">
        {isEditing ? (
          <div className="space-y-2 mb-4">
            <input value={form.title} onChange={e => setForm({...form,title:e.target.value})} className="w-full text-base font-bold border border-stone-200 rounded-lg px-2.5 py-1.5" />
            <div className="grid grid-cols-2 gap-2">
              <IdentitySelect value={form.owner} onChange={v => setForm({...form,owner:v})} />
              <select value={form.status} onChange={e => setForm({...form,status:e.target.value})} className="text-sm border border-stone-200 rounded-lg px-2 py-1.5">
                {DREAM_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <textarea value={form.description} onChange={e => setForm({...form,description:e.target.value})} placeholder="描述" rows={2} className="w-full text-sm border border-stone-200 rounded-lg px-2.5 py-1.5" />
            <textarea value={form.why} onChange={e => setForm({...form,why:e.target.value})} placeholder="為什麼這對你重要" rows={2} className="w-full text-sm border border-stone-200 rounded-lg px-2.5 py-1.5" />
            <ImageUploadField value={form.image} onChange={v => setForm({...form,image:v})} />
            <div className="flex gap-2">
              <button onClick={saveEdit} className="flex-1 bg-amber-500 text-white text-sm font-medium rounded-lg py-2">儲存</button>
              <button onClick={() => setIsEditing(false)} className="px-4 text-sm text-stone-400">取消</button>
            </div>
          </div>
        ) : (
          <>
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5 flex-wrap"><IdentityBadge owner={dream.owner} size="md" /><DreamStatusPill status={dream.status} /></div>
              <button onClick={() => { setForm({ title:dream.title, description:dream.description, why:dream.why, image:dream.image, owner:dream.owner, status:dream.status }); setIsEditing(true); }} className="text-stone-400 p-1"><Icon name="Pencil" size={15} /></button>
            </div>
            <h3 className="font-display text-xl font-bold text-stone-800 mb-2">{dream.title}</h3>
            <ProgressBar value={progress} />
            {dream.description && <p className="text-sm text-stone-600 mt-3 leading-relaxed">{dream.description}</p>}
            {dream.why && <div className="mt-3 bg-amber-50 rounded-xl p-3"><p className="text-xs font-semibold text-amber-700 mb-1">為什麼這對我重要</p><p className="text-sm text-stone-700 leading-relaxed">{dream.why}</p></div>}
          </>
        )}

        {!isEditing && (
          <div className="mt-4">
            <p className="text-xs font-semibold text-stone-500 mb-2 flex items-center gap-1"><Icon name="Heart" size={12} className="text-rose-400" />支持系統</p>
            <div className="mb-3">
              <p className="text-[11px] text-stone-400 mb-1">我希望伴侶如何支持我</p>
              {sup.needed.length === 0 && <p className="text-xs text-stone-300 mb-1">尚未填寫</p>}
              {sup.needed.map((n,i) => <p key={i} className="text-sm text-stone-700 flex items-start gap-1.5 mb-1"><Icon name="MessageCircle" size={13} className="text-purple-400 flex-shrink-0 mt-0.5" />{n}</p>)}
              <div className="flex gap-2 mt-1.5"><input value={neededNote} onChange={e => setNeededNote(e.target.value)} placeholder="例如：陪我討論、給我回饋..." className="flex-1 text-sm border border-stone-200 rounded-lg px-2.5 py-1.5" /><button onClick={submitNeeded} className="px-3 bg-purple-500 text-white text-sm rounded-lg">加入</button></div>
            </div>
            <div>
              <p className="text-[11px] text-stone-400 mb-1">已收到的支持</p>
              {sup.received.length === 0 && <p className="text-xs text-stone-300 mb-1">尚未紀錄</p>}
              {sup.received.map((n,i) => <p key={i} className="text-sm text-emerald-700 flex items-start gap-1.5 mb-1"><Icon name="CheckCircle2" size={13} className="text-emerald-500 flex-shrink-0 mt-0.5" />{n}</p>)}
              <div className="flex gap-2 mt-1.5"><input value={supportNote} onChange={e => setSupportNote(e.target.value)} placeholder="記錄一個剛收到的支持..." className="flex-1 text-sm border border-stone-200 rounded-lg px-2.5 py-1.5" /><button onClick={submitRecv} className="px-3 bg-stone-800 text-white text-sm rounded-lg">加入</button></div>
            </div>
          </div>
        )}

        {!isEditing && (
          <div className="mt-5">
            <div className="flex items-center justify-between mb-2">
              <p className="text-xs font-semibold text-stone-500">夢想 → 專案 → 行動</p>
              {!addingProject && <button onClick={() => setAddingProject(true)} className="text-xs text-amber-600 flex items-center gap-0.5"><Icon name="Plus" size={11} />新增專案</button>}
            </div>
            {addingProject && (
              <div className="space-y-1.5 mb-3">
                <input value={newProjTitle} onChange={e => setNewProjTitle(e.target.value)} placeholder="專案名稱..." className="w-full text-xs border border-stone-200 rounded-lg px-2 py-1.5" />
                <div className="flex gap-2 items-center">
                  <IdentitySelect value={newProjOwner} onChange={setNewProjOwner} />
                  <button onClick={submitProject} className="text-xs bg-amber-500 text-white rounded-lg px-3 py-1.5">加入</button>
                  <button onClick={() => setAddingProject(false)} className="text-xs text-stone-400">取消</button>
                </div>
              </div>
            )}
            <div className="border-l-2 border-dashed border-stone-200 pl-3 space-y-3">
              {dreamProjects.map(p => (
                <ProjectRow key={p.id} project={p} tasks={tasks} onAddTask={onAddTask} onDeleteProject={onDeleteProject} onUpdateProject={onUpdateProject} cycleTask={cycleTask} onOpenTask={id => { onClose(); openTask(id); }} />
              ))}
              {dreamProjects.length === 0 && !addingProject && <p className="text-xs text-stone-300">這個夢想還沒有展開成專案</p>}
            </div>
          </div>
        )}

        {!isEditing && (
          <div className="mt-5 flex gap-2">
            <button onClick={() => { goToKanban(dream.id); onClose(); }} className="flex-1 rounded-xl bg-stone-800 text-white text-sm font-medium py-2.5 flex items-center justify-center gap-1.5"><Icon name="LayoutGrid" size={14} />在看板中查看</button>
            <DeleteConfirmButton onConfirm={() => { onDeleteDream(dream.id); onClose(); }} label="刪除夢想" className="border border-rose-200 text-rose-500 rounded-xl px-3 text-sm" />
          </div>
        )}
      </div>
    </ModalShell>
  );
}

/* ================================================================
   看板 Kanban
   ================================================================ */

function KanbanView({ dreams, projects, tasks, filterDreamId, setFilterDreamId, openTask, moveTask, onAddTask, goToDreams }) {
  const [draggingId, setDraggingId] = useState(null);
  const [newTitle, setNewTitle] = useState('');
  const [newProjectId, setNewProjectId] = useState('');
  const visibleProjects = filterDreamId === 'all' ? projects : projects.filter(p => p.dreamId === filterDreamId);
  const vpIds = visibleProjects.map(p => p.id);
  const visibleTasks = tasks.filter(t => vpIds.includes(t.projectId));
  const filterDream = filterDreamId !== 'all' ? dreams.find(d => d.id === filterDreamId) : null;
  function handleDrop(status) { if (draggingId) { moveTask(draggingId, status); setDraggingId(null); } }
  function submitAdd() {
    const pid = (newProjectId && projects.find(p => p.id === newProjectId)) ? newProjectId : (projects[0]?.id || '');
    if (!newTitle.trim() || !pid) return;
    onAddTask(pid, newTitle.trim()); setNewTitle('');
  }
  return (
    <div className="pb-6">
      <SectionTitle icon={<Icon name="LayoutGrid" size={16} className="text-amber-500" />} title="專案與待辦看板" subtitle="拖曳或點「推進」" />
      {dreams.length > 0 && (
        <div className="mb-3">
          <select value={filterDreamId} onChange={e => setFilterDreamId(e.target.value)} className="text-sm border border-stone-200 rounded-lg px-2.5 py-1.5 bg-white w-full">
            <option value="all">全部夢想</option>
            {dreams.map(d => <option key={d.id} value={d.id}>{d.title}</option>)}
          </select>
        </div>
      )}
      {filterDream && <div className="mb-3 bg-amber-50 rounded-xl px-3 py-2"><DreamTrail dream={filterDream} /></div>}
      {projects.length === 0
        ? <EmptyState iconName="LayoutGrid" title="還沒有任何待辦事項" subtitle="先到夢想地圖建立一個夢想，再從裡面新增專案" action={<button onClick={goToDreams} className="bg-amber-500 text-white text-sm font-medium rounded-lg px-4 py-2 flex items-center gap-1"><Icon name="Sparkles" size={14} />前往夢想地圖</button>} />
        : (
          <>
            <div className="flex gap-3 overflow-x-auto no-scrollbar pb-2" style={{ scrollSnapType:'x mandatory' }}>
              {TASK_STATUSES.map(status => {
                const colTasks = visibleTasks.filter(t => t.status === status);
                return (
                  <div key={status} onDragOver={e => e.preventDefault()} onDrop={() => handleDrop(status)}
                    className={`w-72 flex-shrink-0 bg-white rounded-2xl border-t-4 ${TASK_STATUS_STYLES[status].col} border border-stone-200 p-2.5`} style={{ scrollSnapAlign:'start' }}>
                    <div className="flex items-center justify-between mb-2 px-1">
                      <span className="text-sm font-semibold text-stone-700">{status}</span>
                      <span className="text-xs text-stone-400">{colTasks.length}</span>
                    </div>
                    <div className="space-y-2">
                      {colTasks.map(t => {
                        const { project, dream } = getBreadcrumb(t, projects, dreams);
                        return (
                          <div key={t.id} draggable onDragStart={() => setDraggingId(t.id)} onClick={() => openTask(t.id)} className="rounded-xl border border-stone-200 p-2.5 bg-stone-50 cursor-pointer">
                            <div className="flex items-start justify-between gap-1">
                              <p className="text-sm font-medium text-stone-800 leading-snug">{t.title}</p>
                              <Icon name="GripVertical" size={13} className="text-stone-300 flex-shrink-0 mt-0.5" />
                            </div>
                            <DreamTrail dream={dream} project={project} />
                            <div className="flex items-center justify-between mt-2">
                              <IdentityBadge owner={t.owner} />
                              {t.dueDate && <span className="text-[10px] text-stone-400 flex items-center gap-0.5"><Icon name="Clock" size={10} />{t.dueDate.slice(5)}</span>}
                            </div>
                            {status !== '已完成' && (
                              <button onClick={e => { e.stopPropagation(); moveTask(t.id, nextTaskStatus(t.status)); }}
                                className="mt-2 w-full text-[11px] text-amber-600 font-medium border border-amber-200 bg-amber-50 rounded-lg py-1 flex items-center justify-center gap-1">
                                推進到下一步 <Icon name="ArrowRight" size={11} />
                              </button>
                            )}
                          </div>
                        );
                      })}
                      {colTasks.length === 0 && <p className="text-xs text-stone-300 text-center py-4">沒有項目</p>}
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="mt-4 rounded-xl border border-dashed border-stone-300 p-3 space-y-2">
              <p className="text-xs font-semibold text-stone-500 flex items-center gap-1"><Icon name="Plus" size={12} />快速新增待辦</p>
              <input value={newTitle} onChange={e => setNewTitle(e.target.value)} placeholder="新的行動項目..." className="w-full text-sm border border-stone-200 rounded-lg px-2.5 py-1.5" />
              <div className="flex gap-2">
                <select value={newProjectId || (projects[0]?.id||'')} onChange={e => setNewProjectId(e.target.value)} className="flex-1 text-sm border border-stone-200 rounded-lg px-2.5 py-1.5">
                  {projects.map(p => { const d = dreams.find(d => d.id === p.dreamId); return <option key={p.id} value={p.id}>{d ? d.title+' / ' : ''}{p.title}</option>; })}
                </select>
                <button onClick={submitAdd} className="px-4 bg-amber-500 text-white text-sm font-medium rounded-lg">新增</button>
              </div>
            </div>
          </>
        )}
    </div>
  );
}

function TaskDetailModal({ task, project, dream, onClose, setStatus, onUpdateTask, onDeleteTask }) {
  const [isEditing, setIsEditing] = useState(false);
  const [form, setForm] = useState({ title: task.title, description: task.description, dueDate: task.dueDate, owner: task.owner, supporters: task.supporters });
  function saveEdit() { if (!form.title.trim()) return; onUpdateTask(task.id, { ...form, title: form.title.trim() }); setIsEditing(false); }
  function toggleSupporter(key) { setForm(f => ({ ...f, supporters: f.supporters.includes(key) ? f.supporters.filter(s=>s!==key) : [...f.supporters, key] })); }
  return (
    <ModalShell onClose={onClose}>
      <div className="p-5">
        <div className="flex items-center justify-between mb-3">
          <DreamTrail dream={dream} project={project} task={task} />
          <button onClick={onClose} className="text-stone-400 flex-shrink-0 ml-2"><Icon name="X" size={20} /></button>
        </div>
        {isEditing ? (
          <div className="space-y-2 mb-4">
            <input value={form.title} onChange={e => setForm({...form,title:e.target.value})} className="w-full text-base font-bold border border-stone-200 rounded-lg px-2.5 py-1.5" />
            <textarea value={form.description} onChange={e => setForm({...form,description:e.target.value})} placeholder="描述" rows={2} className="w-full text-sm border border-stone-200 rounded-lg px-2.5 py-1.5" />
            <div className="grid grid-cols-2 gap-2">
              <input type="date" value={form.dueDate} onChange={e => setForm({...form,dueDate:e.target.value})} className="text-sm border border-stone-200 rounded-lg px-2.5 py-1.5" />
              <IdentitySelect value={form.owner} onChange={v => setForm({...form,owner:v})} />
            </div>
            <div>
              <p className="text-[11px] text-stone-400 mb-1">支援者</p>
              <div className="flex gap-2">
                {['apple','pine'].map(key => (
                  <button key={key} type="button" onClick={() => toggleSupporter(key)}
                    className={`text-xs rounded-lg px-2.5 py-1.5 border ${form.supporters.includes(key) ? 'bg-stone-800 text-white border-stone-800' : 'border-stone-200 text-stone-500'}`}>
                    {OWNERS[key].name}
                  </button>
                ))}
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={saveEdit} className="flex-1 bg-amber-500 text-white text-sm font-medium rounded-lg py-2">儲存</button>
              <button onClick={() => setIsEditing(false)} className="px-4 text-sm text-stone-400">取消</button>
            </div>
          </div>
        ) : (
          <>
            <div className="flex items-start justify-between gap-2 mb-2">
              <h3 className="font-display text-lg font-bold text-stone-800">{task.title}</h3>
              <button onClick={() => { setForm({ title:task.title, description:task.description, dueDate:task.dueDate, owner:task.owner, supporters:task.supporters }); setIsEditing(true); }} className="text-stone-400 p-1 flex-shrink-0"><Icon name="Pencil" size={15} /></button>
            </div>
            {task.description && <p className="text-sm text-stone-600 mb-3 leading-relaxed">{task.description}</p>}
            <div className="grid grid-cols-2 gap-3 mb-4">
              <div><p className="text-[11px] text-stone-400 mb-1">負責人</p><IdentityBadge owner={task.owner} size="md" /></div>
              <div><p className="text-[11px] text-stone-400 mb-1">截止日期</p><p className="text-sm text-stone-700 flex items-center gap-1"><Icon name="Clock" size={12} />{task.dueDate || '未設定'}</p></div>
            </div>
            {task.supporters.length > 0 && <div className="mb-4"><p className="text-[11px] text-stone-400 mb-1">支援者</p><div className="flex gap-1 flex-wrap">{task.supporters.map(s => <IdentityBadge key={s} owner={s} />)}</div></div>}
            <p className="text-[11px] text-stone-400 mb-1.5">狀態</p>
            <div className="flex gap-2 mb-4">
              {TASK_STATUSES.map(st => (
                <button key={st} onClick={() => setStatus(task.id, st)}
                  className={`flex-1 text-xs font-medium rounded-lg py-2 border ${task.status === st ? TASK_STATUS_STYLES[st].pill : 'border-stone-200 text-stone-400 bg-white'}`}>
                  {st}
                </button>
              ))}
            </div>
            <DeleteConfirmButton onConfirm={() => { onDeleteTask(task.id); onClose(); }} label="刪除任務" className="border border-rose-200 text-rose-500 rounded-xl px-3 py-2 text-sm w-full justify-center" />
          </>
        )}
      </div>
    </ModalShell>
  );
}

    <div className="pb-6">

          <div className="grid grid-cols-2 gap-3">

              const { project, dream } = getBreadcrumb(t, projects, dreams);
              return (
                <div key={t.id} className="bg-white rounded-2xl border border-stone-100 p-2 shadow-sm relative">
                  <div className="absolute -top-2 -right-2 bg-emerald-500 text-white rounded-full w-7 h-7 flex items-center justify-center" style={{ transform:'rotate(8deg)' }}>
                    <Icon name="CheckCircle2" size={14} />
                  </div>
                  <div className="rounded-xl overflow-hidden h-24 mb-2"><DreamThumbnail image={dream?.image || ''} /></div>

                  <DreamTrail dream={dream} project={project} />
                  <div className="flex items-center justify-between mt-2">
                    <IdentityBadge owner={t.owner} />

}

    <div className="min-h-screen bg-stone-50 flex items-center justify-center p-6">

        </div>
        <h1 className="font-display text-xl font-bold text-stone-800 text-center mb-2">需要先設定連線</h1>
        <p className="text-sm text-stone-500 text-center mb-6">這個網站需要連接你的 Google Sheets 才能儲存資料。</p>
        <div className="space-y-3 text-sm text-stone-700 bg-white rounded-2xl border border-stone-200 p-4">
          <p className="font-semibold text-stone-800">設定步驟：</p>
          <ol className="space-y-2 list-decimal list-inside text-stone-600">
            <li>建立一個新的 Google Sheets（隨便命名）</li>
            <li>建立一個 Google Drive 資料夾（用來存照片）</li>
            <li>開啟 Google Apps Script（script.google.com）建立新專案</li>
            <li>把 <code className="bg-stone-100 px-1 rounded text-xs">Code.gs</code> 的內容貼進去，填入兩個 ID</li>
            <li>點「部署 &gt; 新增部署」，類型選網路應用程式，執行身分選「我」，存取選「所有人」</li>
            <li>複製產生的 Web App 網址</li>
            <li>打開 <code className="bg-stone-100 px-1 rounded text-xs">index.html</code>，把網址貼到最上方的 <code className="bg-stone-100 px-1 rounded text-xs">APPS_SCRIPT_URL</code></li>
            <li>儲存後重新開啟，就可以開始使用了</li>
          </ol>
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   主程式 App
   ================================================================ */

function App() {
  const [activeTab, setActiveTab] = useState('dashboard');
  const [loaded, setLoaded] = useState(false);
  const [loadError, setLoadError] = useState('');
  const [syncing, setSyncing] = useState(false);

  const [dreams, setDreams] = useState([]);
  const [projects, setProjects] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [events, setEvents] = useState([]);
  const [support, setSupport] = useState({});

  const now = new Date();
  const [calYear, setCalYear] = useState(now.getFullYear());
  const [calMonth, setCalMonth] = useState(now.getMonth());
  const [selectedDay, setSelectedDay] = useState(null);
  const [selectedDreamId, setSelectedDreamId] = useState(null);
  const [selectedTaskId, setSelectedTaskId] = useState(null);
  const [kanbanFilter, setKanbanFilter] = useState('all');

  async function fetchData() {
    setSyncing(true);
    try {
      const data = await loadAllData();
      setDreams(data.dreams || []);
      setProjects(data.projects || []);
      setTasks(data.tasks || []);
      setEvents(data.events || []);
      setSupport(data.support || {});
      setLoadError('');
    } catch (err) {
      setLoadError('無法讀取資料：' + err.message);
    } finally {
      setSyncing(false); setLoaded(true);
    }
  }

  useEffect(() => { if (IS_CONFIGURED) fetchData(); else setLoaded(true); }, []);

  /* 狀態更新 + 自動同步到 Sheets */
  function save(key, updater, setter) {
    setter(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveToSheets(key, next).catch(err => console.error('儲存失敗', key, err));
      return next;
    });
  }

  function cycleTask(id) { save('tasks', ts => ts.map(t => t.id===id ? {...t,status:nextTaskStatus(t.status)} : t), setTasks); }
  function setTaskStatus(id, status) { save('tasks', ts => ts.map(t => t.id===id ? {...t,status} : t), setTasks); }
  function addTask(projectId, title) { save('tasks', ts => [...ts, {id:'t'+Date.now(),projectId,title,description:'',dueDate:'',owner:'us',supporters:[],status:'待開始'}], setTasks); }
  function updateTask(id, fields) { save('tasks', ts => ts.map(t => t.id===id ? {...t,...fields} : t), setTasks); }
  function deleteTask(id) { save('tasks', ts => ts.filter(t => t.id!==id), setTasks); }

  function addDream(fields) { save('dreams', ds => [...ds, {id:'d'+Date.now(),title:fields.title,owner:fields.owner,status:'萌芽中',description:fields.description||'',why:fields.why||'',image:fields.image||'',updates:[]}], setDreams); }
  function updateDream(id, fields) { save('dreams', ds => ds.map(d => d.id===id ? {...d,...fields} : d), setDreams); }
  function deleteDream(id) {
    const pids = projects.filter(p => p.dreamId===id).map(p => p.id);
    save('tasks', ts => ts.filter(t => !pids.includes(t.projectId)), setTasks);
    save('projects', ps => ps.filter(p => p.dreamId!==id), setProjects);
    save('dreams', ds => ds.filter(d => d.id!==id), setDreams);
    save('support', s => { const c={...s}; delete c[id]; return c; }, setSupport);
    setSelectedDreamId(cur => cur===id ? null : cur);
  }

  function addProject(dreamId, title, owner) { save('projects', ps => [...ps, {id:'p'+Date.now(),dreamId,title,owner}], setProjects); }
  function updateProject(id, fields) { save('projects', ps => ps.map(p => p.id===id ? {...p,...fields} : p), setProjects); }
  function deleteProject(id) {
    save('tasks', ts => ts.filter(t => t.projectId!==id), setTasks);
    save('projects', ps => ps.filter(p => p.id!==id), setProjects);
  }

  function addEvent(date, fields) { save('events', es => [...es, {id:'e'+Date.now(),date,...fields}], setEvents); }

  function addSupportReceived(dreamId, note) {
    save('support', s => { const c = s[dreamId]||{needed:[],received:[]}; return {...s,[dreamId]:{...c,received:[...c.received,note]}}; }, setSupport);
  }
  function addSupportNeeded(dreamId, note) {
    save('support', s => { const c = s[dreamId]||{needed:[],received:[]}; return {...s,[dreamId]:{...c,needed:[...c.needed,note]}}; }, setSupport);
  }

  const selectedDream = dreams.find(d => d.id === selectedDreamId) || null;
  const selectedTask  = tasks.find(t => t.id === selectedTaskId) || null;
  const selectedTaskCtx = selectedTask ? getBreadcrumb(selectedTask, projects, dreams) : { project: null, dream: null };

  if (!IS_CONFIGURED) return <SetupScreen />;

  if (!loaded) return (
    <div className="min-h-screen bg-stone-50 flex items-center justify-center">
      <div className="text-center">
        <div className="w-9 h-9 rounded-xl bg-amber-500 flex items-center justify-center mx-auto mb-2"><Icon name="Sparkles" size={18} className="text-white" /></div>
        <p className="text-sm text-stone-400">讀取共同資料中...</p>
      </div>
    </div>
  );

  if (loadError) return (
    <div className="min-h-screen bg-stone-50 flex items-center justify-center p-6">
      <div className="text-center max-w-xs">
        <p className="text-sm font-medium text-rose-600 mb-2">{loadError}</p>
        <button onClick={fetchData} className="text-sm text-amber-600 underline">重新嘗試</button>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-stone-50 text-stone-800 pb-20">
      <TopBar onSync={fetchData} syncing={syncing} />
      <main className="max-w-5xl mx-auto px-4 pt-4">
        {activeTab === 'dashboard' && <Dashboard dreams={dreams} projects={projects} tasks={tasks} events={events} openDream={setSelectedDreamId} goToTab={setActiveTab} />}
        {activeTab === 'calendar'  && <CalendarView events={events} year={calYear} month={calMonth} setYear={setCalYear} setMonth={setCalMonth} openDay={setSelectedDay} />}
        {activeTab === 'dreams'    && <DreamMapView dreams={dreams} projects={projects} tasks={tasks} openDream={setSelectedDreamId} onAddDream={addDream} />}
        {activeTab === 'kanban'    && <KanbanView dreams={dreams} projects={projects} tasks={tasks} filterDreamId={kanbanFilter} setFilterDreamId={setKanbanFilter} openTask={setSelectedTaskId} moveTask={setTaskStatus} onAddTask={addTask} goToDreams={() => setActiveTab('dreams')} />}
        {activeTab === 'memories'  && <MemoryWallView tasks={tasks} projects={projects} dreams={dreams} />}
      </main>
      <BottomNav active={activeTab} onChange={setActiveTab} />

      {selectedDream && <DreamDetailModal dream={selectedDream} projects={projects} tasks={tasks} support={support} onClose={() => setSelectedDreamId(null)} cycleTask={cycleTask} goToKanban={id => { setKanbanFilter(id); setActiveTab('kanban'); }} onAddSupportReceived={addSupportReceived} onAddSupportNeeded={addSupportNeeded} onUpdateDream={updateDream} onDeleteDream={deleteDream} onAddProject={addProject} onDeleteProject={deleteProject} onUpdateProject={updateProject} onAddTask={addTask} openTask={setSelectedTaskId} />}
      {selectedTask  && <TaskDetailModal task={selectedTask} project={selectedTaskCtx.project} dream={selectedTaskCtx.dream} onClose={() => setSelectedTaskId(null)} setStatus={setTaskStatus} onUpdateTask={updateTask} onDeleteTask={deleteTask} />}
      {selectedDay   && <DayModal dateKey={selectedDay} events={events} onClose={() => setSelectedDay(null)} onAddEvent={addEvent} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
