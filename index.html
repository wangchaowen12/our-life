<html lang="zh-TW">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;overflow:hidden}
    body{font-family:'Noto Sans TC','PingFang TC',system-ui,sans-serif;background:#F8F6F1;color:#2D2820}

    .nav-btn.active{background:rgba(255,255,255,0.18)}
    .nav-icon{font-size:17px;line-height:1}
    .nav-label{font-size:8px;color:rgba(248,246,241,0.65);letter-spacing:.04em;font-family:'Noto Sans TC',sans-serif}

    .sync-btn{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,0.08);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(248,246,241,0.5);transition:all .15s;margin-top:auto}

      .sidebar{display:none}

    .page-scroll::-webkit-scrollbar-thumb{background:#D8D0C4;border-radius:4px}

    input,textarea,select{font-family:'Noto Sans TC',sans-serif;font-size:13px;color:#2D2820;background:#FFF;border:1.5px solid #E0D9CF;border-radius:10px;padding:9px 12px;outline:none;transition:border-color .15s;width:100%}

    .btn-primary{background:#2D4A3E;color:#F8F6F1;border:none;border-radius:10px;padding:9px 20px;font-size:13px;transition:background .15s}
    .btn-primary:hover{background:#3A5F4E}
    .btn-ghost{background:none;border:1.5px solid #E0D9CF;border-radius:10px;padding:9px 16px;font-size:13px;color:#7D7468;transition:all .15s}
    .btn-ghost:hover{border-color:#2D4A3E;color:#2D4A3E}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ════════════════════════════════════════════════════════
   ★ 設定區：貼上你的 Google Apps Script 網址
════════════════════════════════════════════════════════ */
const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
const IS_CONFIGURED = APPS_SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE';

/* ════════════════════════════════════════════════════════
   Google Sheets / Drive API
════════════════════════════════════════════════════════ */
async function apiGet(params) {
  const url = new URL(APPS_SCRIPT_URL);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  return JSON.parse(await res.text());
}
async function apiPost(body) {
  const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(body), redirect: 'follow' });
  return JSON.parse(await res.text());
}
async function sheetsLoadAll() {
  const r = await apiGet({ action: 'getData' });
  if (r.ok) return r.data;
  throw new Error(r.error || '讀取失敗');
}
async function sheetsSave(key, value) {
  await apiPost({ action: 'saveData', key, value });
}
async function driveUploadImage(dataUrl) {
  const [header, base64] = dataUrl.split(',');
  const mimeType = header.match(/:(.*?);/)[1];
  const filename  = 'node-' + Date.now() + '.' + mimeType.split('/')[1];
  const r = await apiPost({ action: 'uploadImage', filename, base64, mimeType });
  if (r.ok) return r.url;
  throw new Error(r.error || '圖片上傳失敗');
}

/* ════════════════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════════════════ */
const APPLE = { key:'apple', name:'蘋果派', color:'#E8956D' };
const PINE  = { key:'pine',  name:'松果',   color:'#5A8F7B' };
const US    = { key:'us',    name:'我們',   color:'#8B7BAF' };
const PEOPLE = { apple:APPLE, pine:PINE, us:US };

const STATUS_LABEL = { todo:'待開始', doing:'進行中', done:'已完成' };
const STATUS_COLOR = {
  todo:  { bg:'rgba(160,150,136,.1)', text:'#7D7468', border:'rgba(160,150,136,.3)' },
  doing: { bg:'rgba(232,149,109,.1)', text:'#C07040', border:'rgba(232,149,109,.3)' },
  done:  { bg:'rgba(45,74,62,.1)',    text:'#2D4A3E', border:'rgba(45,74,62,.3)'    },
};

const PAGES = [
  { key:'home',      label:'首頁',  icon:'🏠' },
  { key:'dream',     label:'夢想',  icon:'✦'  },
  { key:'calendar',  label:'月曆',  icon:'📅' },
  { key:'projects',  label:'專案',  icon:'◎'  },
  { key:'memories',  label:'回憶',  icon:'📸' },
  { key:'review',    label:'回顧',  icon:'📖' },
];
const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const DAYS   = ['日','一','二','三','四','五','六'];

/* ════════════════════════════════════════════════════════
   LOCAL STORAGE
════════════════════════════════════════════════════════ */
const LS_KEY = 'apple-pine-v2';
function lsLoad() { try { const s=localStorage.getItem(LS_KEY); return s?JSON.parse(s):null; } catch(e){ return null; } }
function lsSave(s) { try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch(e){} }

/* ════════════════════════════════════════════════════════
   DATA MODEL
════════════════════════════════════════════════════════ */
function uid() { return Math.random().toString(36).slice(2, 9); }

function makeNode(title, desc='') {
  return { id:uid(), title, desc, image:null, updates:[] };
}
function makeAction(title) {
  return { id:uid(), title, desc:'', image:null, updates:[], status:'todo', assignee:'us', dueDate:null, completedAt:null };
}

function buildDefault() {
  const domains = [
    'IRC 內在真實練習圈','森林療癒','身心健康','關係經營',
    '學習成長','財務工作','旅行探索','家與生活空間',
  ].map(t => makeNode(t));
  const [irc,forest,health,relation,learning,finance,travel,home] = domains;
  const projects = {
    [irc.id]:      ['品牌建立','IRC 網站','年度盛會','SOF研究','引導員培育','課程設計','身體覺察','社群經營'].map(t=>makeNode(t)),
    [forest.id]:   ['森林工作坊','自然教育','森林探勘','森林旅行','合作夥伴','裝備','品牌建立','森林課程'].map(t=>makeNode(t)),
    [health.id]:   ['空中瑜伽','Feldenkrais','運動','睡眠','飲食','身體保養','情緒照顧','休息'].map(t=>makeNode(t)),
    [relation.id]: ['深度對話','約會','共同決策','衝突修復','傾聽','陪伴','家庭','朋友'].map(t=>makeNode(t)),
    [learning.id]: ['閱讀','課程','研究','寫作','海外學習','反思','創作','AI工具'].map(t=>makeNode(t)),
    [finance.id]:  ['收入','投資','儲蓄','工作安排','事業規劃','共同預算','保險','退休規劃'].map(t=>makeNode(t)),
    [travel.id]:   ['京都','大阪','森林旅行','淡蘭古道','海外旅行','文化探索','攝影','自由旅行'].map(t=>makeNode(t)),
    [home.id]:     ['整理收納','工作室','生活儀式','居住品質','家具','植物','居家修繕','共同空間'].map(t=>makeNode(t)),
  };

  const actions = {
    [eventProj.id]: ['找場地','招募協作者','宣傳','活動流程','講者邀請','教材準備','預算','志工招募'].map(t=>makeAction(t)),
  };
  return { dream:makeNode('共創理想生活'), domains, projects, actions };
}

function buildDefaultState() {
  return { demData:buildDefault(), calEvents:[], todayStatus:{ apple:{stress:'normal',note:''}, pine:{stress:'normal',note:''} }, support:{} };
}

/* ════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════ */
function todayKey() {
  const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayLabel() {
  const d=new Date(), wd=['日','一','二','三','四','五','六'];
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日 · 星期${wd[d.getDay()]}`;
}
function toKey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function monthGrid(y,m) {
  const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate(), cells=[];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1;d<=days;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);
  return cells;
}
function orbitPositions(n,rx=38,ry=34) {
  return Array.from({length:n},(_,i)=>{const a=(i/n)*2*Math.PI-Math.PI/2;return{x:50+rx*Math.cos(a),y:50+ry*Math.sin(a)};});
}

/* ════════════════════════════════════════════════════════
   IMAGE UPLOAD FIELD
════════════════════════════════════════════════════════ */
function ImageUploadField({ value, onChange }) {
  const [warning, setWarning] = useState('');
  const [uploading, setUploading] = useState(false);
  const [failed, setFailed] = useState(false);

  useEffect(() => { setFailed(false); }, [value]);

  function handleFile(e) {
    const file = e.target.files&&e.target.files[0]; e.target.value='';
    if (!file) return;
    if (file.size>10*1024*1024) { setWarning('照片超過 10MB，請選小一點的'); return; }
    if (!IS_CONFIGURED) { setWarning('請先設定 Google Apps Script 網址才能上傳照片'); return; }
    setWarning(''); setUploading(true);
    const reader = new FileReader();
    reader.onload = async () => {
      try { const url = await driveUploadImage(reader.result); onChange(url); setFailed(false); }
      catch (err) { setWarning('上傳失敗：' + err.message); }
      finally { setUploading(false); }
    };
    reader.onerror = () => { setWarning('讀取失敗'); setUploading(false); };
    reader.readAsDataURL(file);
  }

  return (
    <div style={{ display:'flex',flexDirection:'column',gap:6 }}>
      <label style={{ display:'block',border:'1.5px dashed #D8D0C4',borderRadius:10,padding:'10px',textAlign:'center',fontSize:12,color:uploading?'#C0B8AE':'#A09688',cursor:uploading?'not-allowed':'pointer',background:uploading?'transparent':'rgba(255,255,255,.5)' }}>
        {uploading ? '上傳至 Google Drive 中...' : '📷 上傳照片'}
        <input type="file" accept="image/*" style={{display:'none'}} onChange={handleFile} disabled={uploading} />
      </label>
      {warning && <p style={{fontSize:11,color:'#C0887A'}}>{warning}</p>}
      {value && (
        <div style={{position:'relative',height:80,borderRadius:10,overflow:'hidden',border:'1px solid #E0D9CF'}}>
          {!failed
            ? <img src={value} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}} onError={()=>setFailed(true)} />
            : <div style={{width:'100%',height:'100%',background:'#F0EDE8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'#C0B8AE'}}>圖片無法載入</div>}
          <button type="button" onClick={()=>onChange(null)} style={{position:'absolute',top:4,right:4,width:20,height:20,borderRadius:'50%',background:'rgba(255,255,255,.9)',border:'none',fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>×</button>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   DEM — EditDialog (enhanced with image, updates, support)
════════════════════════════════════════════════════════ */
function EditDialog({ node, onSave, onDelete, onClose, support, onSupportChange }) {
  const [title, setTitle]   = useState(node.title);
  const [desc, setDesc]     = useState(node.desc||'');
  const [image, setImage]   = useState(node.image||null);
  const [updates, setUpdates] = useState(node.updates||[]);
  const [updateText, setUpdateText] = useState('');
  const [neededText, setNeededText] = useState('');
  const [receivedText, setReceivedText] = useState('');
  const [tab, setTab] = useState('basic'); // basic | updates | support
  const titleRef = useRef();
  const sup = support[node.id] || { needed:[], received:[] };

  useEffect(() => { titleRef.current?.focus(); titleRef.current?.select(); }, []);

  function handleSave() {
    if (!title.trim()) return;
    onSave({ ...node, title:title.trim(), desc:desc.trim(), image, updates });
    onClose();
  }
  function handleDelete() {
    if (window.confirm(`確定要刪除「${node.title}」嗎？`)) { onDelete(node.id); onClose(); }
  }
  function addUpdate() {
    if (!updateText.trim()) return;
    const entry = { date:todayKey(), text:updateText.trim() };
    setUpdates(prev=>[entry,...prev]); setUpdateText('');
  }
  function addNeeded() {
    if (!neededText.trim()) return;
    const newSup = { ...sup, needed:[...sup.needed, neededText.trim()] };
    onSupportChange(node.id, newSup); setNeededText('');
  }
  function addReceived() {
    if (!receivedText.trim()) return;
    const newSup = { ...sup, received:[...sup.received, receivedText.trim()] };
    onSupportChange(node.id, newSup); setReceivedText('');
  }

  const tabStyle = (t) => ({
    background:'none', border:'none', cursor:'pointer', fontSize:12,
    padding:'6px 12px', borderRadius:8, fontFamily:'inherit',
    color: tab===t ? '#2D4A3E' : '#A09688',
    background: tab===t ? 'rgba(45,74,62,.08)' : 'none',
    fontWeight: tab===t ? 500 : 400,
  });

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(45,40,35,.25)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#FDFAF5',borderRadius:20,width:'100%',maxWidth:420,maxHeight:'85vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(45,40,35,.14)',animation:'dialogIn .22s cubic-bezier(.22,1,.36,1) both'}}>
        {/* Tabs */}
        <div style={{display:'flex',gap:4,padding:'14px 16px 0',borderBottom:'1px solid #EDE8E0',flexShrink:0}}>
          <button style={tabStyle('basic')} onClick={()=>setTab('basic')}>基本</button>
          <button style={tabStyle('image')} onClick={()=>setTab('image')}>圖片</button>
          <button style={tabStyle('updates')} onClick={()=>setTab('updates')}>更新 {updates.length>0?`(${updates.length})`:''}</button>
          <button style={tabStyle('support')} onClick={()=>setTab('support')}>支持</button>
        </div>

        {/* Content */}
        <div style={{overflowY:'auto',padding:'18px 20px',flex:1}}>
          {tab==='basic' && (
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div>
                <label style={{display:'block',fontSize:10,color:'#A09688',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:5}}>標題</label>
                <input ref={titleRef} value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSave()} placeholder="節點名稱…" />
              </div>
              <div>
                <label style={{display:'block',fontSize:10,color:'#A09688',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:5}}>描述</label>
                <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="這個節點的意義…" rows={3} />
              </div>
            </div>
          )}
          {tab==='image' && (
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <p style={{fontSize:12,color:'#A09688'}}>上傳一張代表這個節點的照片或願景圖</p>
              <ImageUploadField value={image} onChange={setImage} />
            </div>
          )}
          {tab==='updates' && (
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{display:'flex',gap:8}}>
                <input value={updateText} onChange={e=>setUpdateText(e.target.value)} placeholder="記錄一個新進展…" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&addUpdate()} />
                <button onClick={addUpdate} className="btn-primary" style={{padding:'9px 14px',flexShrink:0}}>加入</button>
              </div>
              {updates.length===0 && <p style={{fontSize:12,color:'#C0B8AE',textAlign:'center',padding:'20px 0'}}>還沒有更新紀錄</p>}
              {updates.map((u,i)=>(
                <div key={i} style={{display:'flex',gap:8,borderBottom:'1px solid #EDE8E0',paddingBottom:8}}>
                  <span style={{fontSize:11,color:'#C0B8AE',flexShrink:0,marginTop:1}}>{u.date}</span>
                  <span style={{fontSize:13,color:'#3D3830',lineHeight:1.5}}>{u.text}</span>
                </div>
              ))}
            </div>
          )}
          {tab==='support' && (
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              <div>
                <p style={{fontSize:11,color:'#A09688',marginBottom:8,letterSpacing:'.04em'}}>我希望伴侶如何支持我</p>
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  <input value={neededText} onChange={e=>setNeededText(e.target.value)} placeholder="例如：陪我討論、給我回饋…" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&addNeeded()} />
                  <button onClick={addNeeded} className="btn-primary" style={{padding:'9px 14px',flexShrink:0}}>加入</button>
                </div>
                {sup.needed.length===0 && <p style={{fontSize:11,color:'#C0B8AE'}}>尚未填寫</p>}
                {sup.needed.map((n,i)=><p key={i} style={{fontSize:12,color:'#3D3830',padding:'5px 0',borderBottom:'1px solid #F0EDE8'}}>· {n}</p>)}
              </div>
              <div>
                <p style={{fontSize:11,color:'#A09688',marginBottom:8,letterSpacing:'.04em'}}>已收到的支持</p>
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  <input value={receivedText} onChange={e=>setReceivedText(e.target.value)} placeholder="記錄一個收到的支持…" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&addReceived()} />
                  <button onClick={addReceived} className="btn-primary" style={{padding:'9px 14px',flexShrink:0}}>加入</button>
                </div>
                {sup.received.length===0 && <p style={{fontSize:11,color:'#C0B8AE'}}>尚未紀錄</p>}
                {sup.received.map((n,i)=>(
                  <p key={i} style={{fontSize:12,color:'#2D4A3E',padding:'5px 0',borderBottom:'1px solid #F0EDE8'}}>✓ {n}</p>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 20px',borderTop:'1px solid #EDE8E0',flexShrink:0}}>
          <button onClick={handleDelete} style={{background:'none',border:'none',fontSize:12,color:'#C0887A',fontFamily:'inherit',cursor:'pointer'}}>刪除節點</button>
          <div style={{display:'flex',gap:8}}>
            <button onClick={onClose} className="btn-ghost" style={{padding:'7px 16px',fontSize:12}}>取消</button>
            <button onClick={handleSave} className="btn-primary" style={{padding:'7px 18px',fontSize:12}}>儲存</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   DEM — OrbitNode
════════════════════════════════════════════════════════ */
function OrbitNode({ node, pos, delay, onZoomIn, onEdit, isPlaceholder }) {
  const [hovered, setHovered] = useState(false);
  if (isPlaceholder) {
    return (
      <div className="node-orbit" style={{left:`${pos.x}%`,top:`${pos.y}%`,animationDelay:`${delay}ms`}}>
        <div onClick={onZoomIn} onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
          style={{width:90,height:90,borderRadius:'50%',border:`2px dashed ${hovered?'#2D4A3E':'#C8C0B4'}`,background:hovered?'rgba(45,74,62,.04)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all .2s'}}>
          <span style={{fontSize:22,color:hovered?'#2D4A3E':'#C8C0B4'}}>＋</span>
        </div>
      </div>
    );
  }
  return (
    <div className="node-orbit" style={{left:`${pos.x}%`,top:`${pos.y}%`,animationDelay:`${delay}ms`}} onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}>
      <div onClick={e=>{e.stopPropagation();onEdit();}} style={{position:'absolute',top:-6,right:-6,width:22,height:22,borderRadius:'50%',background:hovered?'#2D4A3E':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',opacity:hovered?1:0,transition:'all .15s',zIndex:2,fontSize:11,color:'#F8F6F1'}}>✎</div>
      <div onClick={onZoomIn}
        style={{width:104,height:104,borderRadius:'50%',background:hovered?'rgba(255,255,255,.92)':'rgba(255,255,255,.72)',border:`1.5px solid ${hovered?'rgba(45,74,62,.3)':'rgba(180,172,160,.4)'}`,backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',cursor:'pointer',transition:'all .18s',transform:hovered?'scale(1.05)':'scale(1)',boxShadow:hovered?'0 4px 20px rgba(45,74,62,.10)':'0 2px 8px rgba(0,0,0,.04)',position:'relative',overflow:'hidden'}}>
        {node.image && (
          <div style={{position:'absolute',inset:0,borderRadius:'50%',overflow:'hidden',opacity:.2}}>
            <img src={node.image} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}} onError={()=>{}} />
          </div>
        )}
        <span style={{fontSize:node.title.length>7?11:12,fontWeight:500,color:hovered?'#2D4A3E':'#3D3830',textAlign:'center',lineHeight:1.5,letterSpacing:'.03em',padding:'0 10px',transition:'color .18s',position:'relative'}}>
          {node.title}
        </span>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   DEM — DreamExpansionMap
════════════════════════════════════════════════════════ */
function DreamExpansionMap({ data, setData, support, onSupportChange }) {
  const [stack, setStack]          = useState([{id:'dream',title:data.dream.title,depth:0}]);
  const [phase, setPhase]          = useState('idle');
  const [pendingStack, setPending] = useState(null);
  const [animating, setAnimating]  = useState(false);
  const [editTarget, setEditTarget] = useState(null);

  const current    = stack[stack.length-1];
  const depthLabel = ['Life Domains','Projects','Actions'][current.depth]||'';

  const getList = useCallback((id,depth)=>{
    if(depth===0) return data.domains;
    if(depth===1) return data.projects[id]||[];
    if(depth===2) return data.actions[id]||[];
    return [];
  },[data]);

  const children  = getList(current.id, current.depth);
  const slots     = [...children,...Array(Math.max(0,8-children.length)).fill(null)].slice(0,9);
  const positions = orbitPositions(slots.length);

  const navigate = useCallback((ns)=>{ if(animating) return; setAnimating(true); setPhase('exit'); setPending(ns); },[animating]);
  useEffect(()=>{
    if(phase==='exit'){ const t=setTimeout(()=>{ setStack(pendingStack); setPhase('enter'); },260); return()=>clearTimeout(t); }
    if(phase==='enter'){ const t=setTimeout(()=>{ setPhase('idle'); setAnimating(false); setPending(null); },420); return()=>clearTimeout(t); }
  },[phase,pendingStack]);

  const zoomIn = useCallback((node)=>{ if(current.depth>=2) return; navigate([...stack,{id:node.id,title:node.title,depth:current.depth+1}]); },[stack,current,navigate]);
  const zoomTo = useCallback((idx)=>{ if(idx===stack.length-1) return; navigate(stack.slice(0,idx+1)); },[stack,navigate]);

  const updateNode = useCallback((layer,parentId,updated)=>{
    setData(d=>{
      if(layer==='dream') return{...d,dream:updated};
      if(layer==='domains') return{...d,domains:d.domains.map(n=>n.id===updated.id?updated:n)};
      if(layer==='projects') return{...d,projects:{...d.projects,[parentId]:(d.projects[parentId]||[]).map(n=>n.id===updated.id?updated:n)}};
      if(layer==='actions') return{...d,actions:{...d.actions,[parentId]:(d.actions[parentId]||[]).map(n=>n.id===updated.id?updated:n)}};
      return d;
    });
    setStack(s=>s.map(item=>item.id===updated.id?{...item,title:updated.title}:item));
  },[setData]);

  const deleteNode = useCallback((layer,parentId,id)=>{
    setData(d=>{
      if(layer==='domains') return{...d,domains:d.domains.filter(n=>n.id!==id)};
      if(layer==='projects') return{...d,projects:{...d.projects,[parentId]:(d.projects[parentId]||[]).filter(n=>n.id!==id)}};
      if(layer==='actions') return{...d,actions:{...d.actions,[parentId]:(d.actions[parentId]||[]).filter(n=>n.id!==id)}};
      return d;
    });
    setStack(s=>{ const i=s.findIndex(item=>item.id===id); return i>-1?s.slice(0,i):s; });
  },[setData]);

  const addNode = useCallback((layer,parentId)=>{
    const n = layer==='actions' ? makeAction('新節點') : makeNode('新節點');
    setData(d=>{
      if(layer==='domains') return{...d,domains:[...d.domains,n]};
      if(layer==='projects') return{...d,projects:{...d.projects,[parentId]:[...(d.projects[parentId]||[]),n]}};
      if(layer==='actions') return{...d,actions:{...d.actions,[parentId]:[...(d.actions[parentId]||[]),n]}};
      return d;
    });
    setTimeout(()=>setEditTarget({node:n,layer,parentId}),50);
  },[setData]);

  const currentLayer = current.depth===0?'domains':current.depth===1?'projects':'actions';

  return (
    <div style={{flex:1,position:'relative',display:'flex',flexDirection:'column',fontFamily:"'Noto Sans TC','PingFang TC',system-ui,sans-serif",overflow:'hidden',userSelect:'none'}}>
      {/* Top breadcrumb */}
      <div style={{padding:'18px 24px 0',display:'flex',alignItems:'center',gap:6,minHeight:44,flexShrink:0}}>
        {stack.map((s,i)=>(
          <span key={s.id+i} style={{display:'flex',alignItems:'center',gap:6}}>
            {i>0&&<span style={{color:'#C8C0B4',fontSize:13}}>›</span>}
            <button onClick={()=>zoomTo(i)} style={{background:'none',border:'none',padding:'2px 4px',cursor:i===stack.length-1?'default':'pointer',fontSize:13,fontFamily:'inherit',color:i===stack.length-1?'#3D3830':'#A09688',fontWeight:i===stack.length-1?500:400,transition:'color .15s'}} onMouseEnter={e=>{if(i<stack.length-1)e.target.style.color='#2D4A3E'}} onMouseLeave={e=>{if(i<stack.length-1)e.target.style.color='#A09688'}}>{s.title}</button>
          </span>
        ))}
        {depthLabel&&<span style={{marginLeft:8,fontSize:10,letterSpacing:'.12em',color:'#A09688',textTransform:'uppercase',padding:'3px 10px',border:'1px solid #DDD8D0',borderRadius:20,background:'rgba(255,255,255,.7)'}}>{depthLabel}</span>}
        <div style={{marginLeft:'auto'}}>
          <button onClick={()=>setEditTarget({node:data.dream,layer:'dream',parentId:null})} style={{background:'none',border:'1.5px solid #E0D9CF',borderRadius:20,padding:'4px 14px',fontSize:11,color:'#A09688',cursor:'pointer',fontFamily:'inherit',letterSpacing:'.06em',transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='#2D4A3E';e.currentTarget.style.color='#2D4A3E'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#E0D9CF';e.currentTarget.style.color='#A09688'}}>編輯夢想</button>
        </div>
      </div>

      {/* Map */}
      <div style={{flex:1,position:'relative'}}>
        <div className={`phase-${phase}`} style={{position:'absolute',inset:0}}>
          <svg className="svg-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
            {slots.map((node,i)=>{const pos=positions[i];return(<line key={i} x1="50" y1="50" x2={pos.x} y2={pos.y} stroke={node?'#C8C0B4':'#E0D8CE'} strokeWidth="0.5" strokeDasharray={node?'3 5':'2 7'} opacity={node?.5:.25}/>);})}
          </svg>
          <div className="node-center">
            <div style={{width:148,height:148,borderRadius:'50%',background:'#2D4A3E',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 40px rgba(45,74,62,.18)',cursor:stack.length>1?'pointer':'default',position:'relative',overflow:'hidden'}} onClick={()=>stack.length>1&&zoomTo(stack.length-2)}>
              {/* Show dream image subtly in center if available */}
              {stack.length===1&&data.dream.image&&<img src={data.dream.image} alt="" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',opacity:.15}} onError={()=>{}} />}
              <span style={{fontFamily:"'Noto Serif TC',serif",fontSize:current.title.length>7?12:14,fontWeight:400,color:'#F8F6F1',textAlign:'center',lineHeight:1.7,letterSpacing:'.05em',padding:'0 18px',position:'relative'}}>{current.title}</span>
            </div>
            {stack.length>1&&<div style={{textAlign:'center',marginTop:8,fontSize:10,color:'#C0B8AE',letterSpacing:'.06em'}}>點擊返回</div>}
          </div>
          {slots.map((node,i)=>{const pos=positions[i];return(<OrbitNode key={node?node.id:'empty_'+i} node={node} pos={pos} delay={phase==='enter'?i*25:0} isPlaceholder={!node} onZoomIn={()=>node?zoomIn(node):addNode(currentLayer,current.id)} onEdit={()=>node&&setEditTarget({node,layer:currentLayer,parentId:current.id})}/>);})}
        </div>
      </div>

      {stack.length===1&&phase==='idle'&&<div style={{textAlign:'center',padding:'0 0 16px',fontSize:11,color:'#C8C0B4',letterSpacing:'.08em',flexShrink:0}}>點擊節點展開 · 點右上角 ✎ 進行編輯</div>}

      {editTarget&&(
        <EditDialog node={editTarget.node} onSave={u=>updateNode(editTarget.layer,editTarget.parentId,u)} onDelete={id=>deleteNode(editTarget.layer,editTarget.parentId,id)} onClose={()=>setEditTarget(null)} support={support} onSupportChange={onSupportChange} />
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   HOME PAGE
════════════════════════════════════════════════════════ */
function HomePage({ demData, calEvents, todayStatus, setTodayStatus, setPage }) {
  const today  = todayKey();
  const weekEnd = new Date(); weekEnd.setDate(weekEnd.getDate()+7);
  const weekStr = weekEnd.toISOString().slice(0,10);
  const month   = today.slice(0,7);

  const todayEvs    = calEvents.filter(e=>e.date===today);
  const upcomingEvs = calEvents.filter(e=>e.date>today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);

  const allActions = useMemo(()=>{
    const r=[];
    demData.domains.forEach(dom=>{
      (demData.projects[dom.id]||[]).forEach(proj=>{
        (demData.actions[proj.id]||[]).forEach(a=>{
          r.push({...a,domainTitle:dom.title,projectTitle:proj.title});
        });
      });
    });
    return r;
  },[demData]);

  const todayTodos = allActions.filter(a=>a.dueDate===today&&a.status!=='done');
  const doingTodos = allActions.filter(a=>a.status==='doing').slice(0,4);

  return (
    <div className="page-scroll">
      <div style={{padding:'24px 24px 40px',maxWidth:680,margin:'0 auto'}}>
        <div style={{marginBottom:24}}>
          <p style={{fontSize:11,color:'#A09688',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:3}}>{todayLabel()}</p>
          <h1 style={{fontFamily:"'Noto Serif TC',serif",fontSize:20,fontWeight:400,color:'#2D2820',letterSpacing:'.04em'}}>早安，蘋果派 & 松果 ✦</h1>
        </div>

        {/* Status cards */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:22}}>
          {[APPLE,PINE].map(p=>{
            const st = todayStatus[p.key];
            const isHigh = st.stress==='high';
            const evs = todayEvs.filter(e=>e.owner===p.key||e.owner==='us');
            return (
              <div key={p.key} className="card" style={{padding:'16px'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <span style={{width:10,height:10,borderRadius:'50%',background:p.color,display:'inline-block'}}></span>
                  <span style={{fontSize:13,fontWeight:500,color:'#2D2820'}}>{p.name}</span>
                  <span style={{marginLeft:'auto',fontSize:11,padding:'2px 8px',borderRadius:12,background:isHigh?'rgba(192,136,122,.12)':'rgba(91,163,123,.12)',color:isHigh?'#C0887A':'#5BA37B'}}>{isHigh?'高壓':'一般'}</span>
                </div>
                {evs.length===0 ? <p style={{fontSize:12,color:'#C0B8AE'}}>今天沒有安排</p>
                  : evs.slice(0,2).map(e=><p key={e.id} style={{fontSize:12,color:'#7D7468',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>· {e.title}</p>)}
                <button onClick={()=>setTodayStatus(p.key,'stress',isHigh?'normal':'high')} style={{marginTop:10,fontSize:10,padding:'3px 10px',borderRadius:10,border:`1px solid ${isHigh?'#C0887A':'#E0D9CF'}`,background:'none',color:isHigh?'#C0887A':'#A09688',cursor:'pointer'}}>
                  {isHigh?'切換為一般':'標記高壓'}
                </button>
              </div>
            );
          })}
        </div>

        {/* Today todos */}
        {(todayTodos.length>0||doingTodos.length>0) && (
          <div style={{marginBottom:22}}>
            <p style={{fontSize:11,color:'#A09688',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:10}}>今日待辦</p>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {[...todayTodos,...doingTodos.filter(a=>!todayTodos.find(b=>b.id===a.id))].slice(0,5).map(a=>{
                const sc=STATUS_COLOR[a.status];
                return (
                  <div key={a.id} className="card" style={{padding:'11px 14px',display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:7,height:7,borderRadius:'50%',background:sc.text,flexShrink:0}}></div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:13,color:'#2D2820',fontWeight:500}}>{a.title}</p>
                      <p style={{fontSize:11,color:'#A09688',marginTop:1}}>{a.domainTitle} › {a.projectTitle}</p>
                    </div>
                    <span style={{fontSize:11,padding:'2px 8px',borderRadius:10,background:sc.bg,color:sc.text,border:`1px solid ${sc.border}`,flexShrink:0}}>{STATUS_LABEL[a.status]}</span>
                  </div>
                );
              })}
            </div>
            <button onClick={()=>setPage('projects')} style={{marginTop:8,fontSize:12,color:'#2D4A3E',background:'none',border:'none',cursor:'pointer'}}>查看全部專案 →</button>
          </div>
        )}

        {/* Today events */}
        {todayEvs.length>0 && (
          <div style={{marginBottom:22}}>
            <p style={{fontSize:11,color:'#A09688',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:10}}>今日行程</p>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {todayEvs.map(e=>{
                const owner=PEOPLE[e.owner]||PEOPLE.us;
                return (
                  <div key={e.id} className="card" style={{padding:'11px 14px',display:'flex',alignItems:'center',gap:10}}>
                    <span style={{width:7,height:7,borderRadius:'50%',background:owner.color,flexShrink:0}}></span>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:13,color:'#2D2820',fontWeight:500}}>{e.title}</p>
                      <p style={{fontSize:11,color:'#A09688',marginTop:1}}>{e.time&&`${e.time} · `}{owner.name}</p>
                    </div>
                    {e.stress==='high'&&<span style={{fontSize:10,color:'#C0887A',padding:'2px 8px',borderRadius:10,background:'rgba(192,136,122,.1)',border:'1px solid rgba(192,136,122,.3)'}}>高壓</span>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Upcoming */}
        {upcomingEvs.length>0 && (
          <div>
            <p style={{fontSize:11,color:'#A09688',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:10}}>即將到來</p>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {upcomingEvs.map(e=>{
                const owner=PEOPLE[e.owner]||PEOPLE.us;
                const [,mm,dd]=e.date.split('-');
                return (
                  <div key={e.id} className="card" style={{padding:'11px 14px',display:'flex',alignItems:'center',gap:12}}>
                    <div style={{width:38,height:38,borderRadius:9,background:'rgba(45,74,62,.08)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <span style={{fontSize:9,color:'#A09688'}}>{mm}月</span>
                      <span style={{fontSize:14,fontWeight:600,color:'#2D4A3E',lineHeight:1}}>{dd}</span>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:13,color:'#2D2820',fontWeight:500}}>{e.title}</p>
                      <p style={{fontSize:11,color:'#A09688',marginTop:1}}>{owner.name}{e.tags?.length?' · '+e.tags.join(' · '):''}</p>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {todayEvs.length===0&&upcomingEvs.length===0&&todayTodos.length===0&&doingTodos.length===0&&(
          <div style={{textAlign:'center',padding:'48px 0',color:'#C0B8AE'}}>
            <p style={{fontSize:32,marginBottom:10}}>✦</p>
            <p style={{fontFamily:"'Noto Serif TC',serif",fontSize:14}}>今天還是空白的</p>
            <p style={{fontSize:12,marginTop:8}}>去月曆加入行程，或到夢想地圖展開計畫</p>
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   CALENDAR PAGE
════════════════════════════════════════════════════════ */
function CalendarPage({ calEvents, setCalEvents }) {
  const now = new Date();
  const [year, setYear]   = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [selDay, setSelDay] = useState(null);

  function changeMonth(d) { let m=month+d,y=year; if(m<0){m=11;y--;} if(m>11){m=0;y++;} setMonth(m);setYear(y); }
  const cells = monthGrid(year,month);
  const today = todayKey();

  return (
    <div className="page-scroll">
      <div style={{padding:'24px 24px 40px',maxWidth:560,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
          <button onClick={()=>changeMonth(-1)} style={{background:'none',border:'1.5px solid #E0D9CF',borderRadius:9,padding:'6px 12px',cursor:'pointer',color:'#7D7468',fontSize:16}}>‹</button>
          <h2 style={{fontFamily:"'Noto Serif TC',serif",fontSize:18,fontWeight:400,color:'#2D2820'}}>{year} 年 {MONTHS[month]}</h2>
          <button onClick={()=>changeMonth(1)} style={{background:'none',border:'1.5px solid #E0D9CF',borderRadius:9,padding:'6px 12px',cursor:'pointer',color:'#7D7468',fontSize:16}}>›</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',textAlign:'center',marginBottom:6}}>
          {DAYS.map(d=><div key={d} style={{fontSize:11,color:'#A09688',padding:'3px 0'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
          {cells.map((day,i)=>{
            if(!day) return <div key={i}></div>;
            const dk=toKey(year,month,day);
            const evs=calEvents.filter(e=>e.date===dk);
            const isToday=dk===today;
            return (
              <button key={i} onClick={()=>setSelDay(dk)} style={{aspectRatio:'1',borderRadius:9,border:`1.5px solid ${isToday?'#2D4A3E':'rgba(180,172,160,.35)'}`,background:isToday?'rgba(45,74,62,.06)':'rgba(255,255,255,.7)',display:'flex',flexDirection:'column',alignItems:'center',padding:'5px 2px',cursor:'pointer',transition:'all .15s'}}>
                <span style={{fontSize:12,fontWeight:isToday?600:400,color:isToday?'#2D4A3E':'#3D3830'}}>{day}</span>
                <div style={{display:'flex',gap:2,marginTop:2,flexWrap:'wrap',justifyContent:'center'}}>
                  {evs.slice(0,3).map(e=>{const p=PEOPLE[e.owner]||PEOPLE.us;return<span key={e.id} style={{width:5,height:5,borderRadius:'50%',background:p.color,display:'inline-block'}}></span>;})}
                </div>
              </button>
            );
          })}
        </div>
        <div style={{marginTop:18,display:'flex',gap:14,flexWrap:'wrap'}}>
          {[APPLE,PINE,US].map(p=><span key={p.key} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'#A09688'}}><span style={{width:7,height:7,borderRadius:'50%',background:p.color,display:'inline-block'}}></span>{p.name}</span>)}
        </div>
      </div>
      {selDay&&<DayModal dateKey={selDay} events={calEvents} setEvents={setCalEvents} onClose={()=>setSelDay(null)} />}
    </div>
  );
}

function DayModal({ dateKey, events, setEvents, onClose }) {
  const [title,setTitle]=useState('');
  const [time,setTime]=useState('19:00');
  const [owner,setOwner]=useState('us');
  const [stress,setStress]=useState('normal');
  const [tags,setTags]=useState('');
  const [showForm,setShowForm]=useState(false);
  const dayEvs=events.filter(e=>e.date===dateKey).sort((a,b)=>a.time.localeCompare(b.time));
  function submit(){
    if(!title.trim()) return;
    setEvents(p=>[...p,{id:uid(),date:dateKey,time,title:title.trim(),owner,stress,tags:tags.split(',').map(t=>t.trim()).filter(Boolean),note:''}]);
    setTitle('');setTags('');setShowForm(false);
  }
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:100,background:'rgba(45,40,35,.22)',backdropFilter:'blur(6px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#FDFAF5',borderRadius:'20px 20px 0 0',padding:'22px',width:'100%',maxWidth:460,maxHeight:'80vh',overflowY:'auto',animation:'dialogIn .2s both'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
          <h3 style={{fontSize:15,fontWeight:500,color:'#2D2820'}}>{dateKey}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,color:'#A09688',cursor:'pointer'}}>×</button>
        </div>
        {dayEvs.length===0&&!showForm&&<p style={{fontSize:13,color:'#C0B8AE',textAlign:'center',padding:'16px 0'}}>這天還沒有事件</p>}
        <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:14}}>
          {dayEvs.map(e=>{const p=PEOPLE[e.owner]||PEOPLE.us;return(
            <div key={e.id} style={{background:'rgba(255,255,255,.8)',border:'1.5px solid #E0D9CF',borderRadius:11,padding:'11px 13px',display:'flex',gap:8}}>
              <span style={{width:7,height:7,borderRadius:'50%',background:p.color,flexShrink:0,marginTop:5}}></span>
              <div style={{flex:1}}>
                <p style={{fontSize:13,fontWeight:500,color:'#2D2820'}}>{e.title}</p>
                <p style={{fontSize:11,color:'#A09688',marginTop:2}}>{e.time} · {p.name}{e.stress==='high'?' · 🔴 高壓':''}{e.tags?.length?' · '+e.tags.join('、'):''}</p>
              </div>
              <button onClick={()=>setEvents(prev=>prev.filter(x=>x.id!==e.id))} style={{background:'none',border:'none',fontSize:14,color:'#C8C0B4',cursor:'pointer',flexShrink:0}}>×</button>
            </div>
          );})}
        </div>
        {!showForm
          ? <button onClick={()=>setShowForm(true)} style={{width:'100%',background:'none',border:'1.5px dashed #D8D0C4',borderRadius:11,padding:'11px',fontSize:13,color:'#A09688',cursor:'pointer'}}>＋ 新增事件</button>
          : (
            <div style={{border:'1.5px solid #E0D9CF',borderRadius:11,padding:14,display:'flex',flexDirection:'column',gap:9}}>
              <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="事件標題" />
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
                <input type="time" value={time} onChange={e=>setTime(e.target.value)} />
                <select value={owner} onChange={e=>setOwner(e.target.value)}>
                  <option value="apple">🍎 蘋果派</option>
                  <option value="pine">🌲 松果</option>
                  <option value="us">🤝 我們</option>
                </select>
              </div>
              <select value={stress} onChange={e=>setStress(e.target.value)}>
                <option value="normal">一般</option>
                <option value="high">🔴 高壓日</option>
              </select>
              <input value={tags} onChange={e=>setTags(e.target.value)} placeholder="標籤（逗號分隔，如：出差,不回家,約會）" />
              <div style={{display:'flex',gap:8}}>
                <button onClick={submit} className="btn-primary" style={{flex:1}}>儲存</button>
                <button onClick={()=>setShowForm(false)} className="btn-ghost">取消</button>
              </div>
            </div>
          )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════

function ProjectsPage({ demData, setDemData }) {
  const [filterDomain, setFilterDomain]     = useState('all');
  const [filterAssignee, setFilterAssignee] = useState('all');
  const [filterStatus, setFilterStatus]     = useState('todo,doing');
  const [editAction, setEditAction]         = useState(null);

  const allActions = useMemo(()=>{
    const r=[];
    demData.domains.forEach(dom=>{
      if(filterDomain!=='all'&&dom.id!==filterDomain) return;
      (demData.projects[dom.id]||[]).forEach(proj=>{
        (demData.actions[proj.id]||[]).forEach(a=>{
          r.push({...a,domainId:dom.id,domainTitle:dom.title,projectId:proj.id,projectTitle:proj.title});
        });
      });
    });
    return r;
  },[demData,filterDomain]);

  const statuses = filterStatus.split(',');
  const filtered = allActions.filter(a=>{
    if(filterAssignee!=='all'&&a.assignee!==filterAssignee) return false;
    return statuses.includes(a.status);
  });

  function updateAction(projectId, updated) {
    setDemData(d=>({...d,actions:{...d.actions,[projectId]:(d.actions[projectId]||[]).map(a=>a.id===updated.id?updated:a)}}));

  return (
    <div className="page-scroll">
      <div style={{padding:'24px 24px 40px',maxWidth:680,margin:'0 auto'}}>
        <h2 style={{fontFamily:"'Noto Serif TC',serif",fontSize:19,fontWeight:400,color:'#2D2820',marginBottom:16}}>專案 & 行動</h2>
        <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:10}}>
          <select value={filterDomain} onChange={e=>setFilterDomain(e.target.value)} style={{fontSize:12,padding:'6px 10px',borderRadius:9,border:'1.5px solid #E0D9CF',background:'#FFF',cursor:'pointer'}}>
            <option value="all">所有領域</option>
            {demData.domains.map(d=><option key={d.id} value={d.id}>{d.title}</option>)}
          </select>
          <select value={filterAssignee} onChange={e=>setFilterAssignee(e.target.value)} style={{fontSize:12,padding:'6px 10px',borderRadius:9,border:'1.5px solid #E0D9CF',background:'#FFF',cursor:'pointer'}}>
            <option value="all">所有人</option>
            <option value="apple">🍎 蘋果派</option>
            <option value="pine">🌲 松果</option>
            <option value="us">🤝 我們</option>
          </select>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{fontSize:12,padding:'6px 10px',borderRadius:9,border:'1.5px solid #E0D9CF',background:'#FFF',cursor:'pointer'}}>

            <option value="todo">待開始</option>
            <option value="doing">進行中</option>

            <option value="todo,doing,done">全部</option>

        <p style={{fontSize:11,color:'#A09688',marginBottom:14}}>共 {filtered.length} 個行動項目</p>
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          {filtered.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:'#C0B8AE',fontSize:13}}>這個條件下沒有項目</div>}
          {filtered.map(a=>{
            const asn=PEOPLE[a.assignee]||PEOPLE.us;
            const sc=STATUS_COLOR[a.status];
            return (
              <div key={a.id} className="card" style={{padding:'13px 15px'}}>
                <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
                  <div style={{flex:1,minWidth:0}}>

                    <p style={{fontSize:11,color:'#A09688'}}>{a.domainTitle} › {a.projectTitle}</p>

/* ════════════════════════════════════════════════════════

function ReviewPage({ demData, calEvents }) {
  const items = useMemo(()=>{
    const r=[];
    demData.domains.forEach(dom=>{
      (demData.projects[dom.id]||[]).forEach(proj=>{
        (demData.actions[proj.id]||[]).forEach(a=>{
          if(a.status==='done') r.push({...a,domainTitle:dom.title,projectTitle:proj.title,type:'action',date:a.completedAt||''});
        });
      });
    });
    calEvents.forEach(e=>r.push({...e,type:'event'}));
    return r;
  },[demData,calEvents]);

  const byMonth = useMemo(()=>{
    const map={};
    items.forEach(item=>{ if(!item.date) return; const k=item.date.slice(0,7); if(!map[k]) map[k]=[]; map[k].push(item); });
    return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
  },[items]);

  if(byMonth.length===0) return (
    <div className="page-scroll" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100%'}}>
      <div style={{textAlign:'center',color:'#C0B8AE',padding:40}}>
        <p style={{fontSize:32,marginBottom:10}}>📖</p>
        <p style={{fontFamily:"'Noto Serif TC',serif",fontSize:15,marginBottom:8}}>人生時間軸還是空的</p>
        <p style={{fontSize:12}}>完成的事項和月曆事件，會在這裡形成你們的共同故事</p>
      </div>
    </div>
  );

  return (
    <div className="page-scroll">
      <div style={{padding:'24px 24px 40px',maxWidth:640,margin:'0 auto'}}>
        <h2 style={{fontFamily:"'Noto Serif TC',serif",fontSize:19,fontWeight:400,color:'#2D2820',marginBottom:24}}>生活回顧</h2>
        {byMonth.map(([mk,mitems])=>{
          const [y,m]=mk.split('-');
          return (
            <div key={mk} style={{marginBottom:28}}>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
                <div style={{width:36,height:36,borderRadius:'50%',background:'#2D4A3E',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontSize:10,color:'#F8F6F1',fontFamily:"'Noto Serif TC',serif"}}>{parseInt(m)}</span>
                </div>
                <p style={{fontFamily:"'Noto Serif TC',serif",fontSize:15,color:'#2D2820'}}>{y} 年 {MONTHS[parseInt(m)-1]}</p>
              </div>
              <div style={{marginLeft:18,borderLeft:'1px dashed #D8D0C4',paddingLeft:24,display:'flex',flexDirection:'column',gap:7}}>
                {mitems.map((item,i)=>{
                  if(item.type==='action') return (
                    <div key={item.id+i} style={{position:'relative'}}>
                      <div style={{position:'absolute',left:-28,top:8,width:7,height:7,borderRadius:'50%',background:'#2D4A3E',border:'2px solid #F8F6F1',boxShadow:'0 0 0 1px #2D4A3E'}}></div>
                      <div className="card" style={{padding:'10px 13px'}}>
                        <p style={{fontSize:13,fontWeight:500,color:'#2D2820'}}>✓ {item.title}</p>

/* ════════════════════════════════════════════════════════
   APP
════════════════════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState('home');

  const [state, setState] = useState(() => {
    const saved = lsLoad();
    return saved || buildDefaultState();
  });

  const [loading, setLoading]   = useState(IS_CONFIGURED);
  const [loadErr, setLoadErr]   = useState('');
  const [syncing, setSyncing]   = useState(false);
  const saveTimerRef = useRef(null);

  // Load from Sheets on mount
  useEffect(() => {
    if (!IS_CONFIGURED) return;
    fetchFromSheets();
  }, []);

  async function fetchFromSheets() {
    setSyncing(true);
    try {
      const data = await sheetsLoadAll();
      setState(prev => {
        const next = { ...prev };
        if (data.demData)     next.demData     = data.demData;
        if (data.calEvents)   next.calEvents   = data.calEvents;
        if (data.todayStatus) next.todayStatus = data.todayStatus;
        if (data.support)     next.support     = data.support;
        lsSave(next);
        return next;
      });
      setLoadErr('');
    } catch(err) {
      setLoadErr('同步失敗：' + err.message);
    } finally {
      setSyncing(false); setLoading(false);
    }
  }

  // Auto-save: localStorage immediately, Sheets debounced 3s
  useEffect(() => {
    lsSave(state);
    if (!IS_CONFIGURED) return;
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      sheetsSave('demData',     state.demData).catch(()=>{});
      sheetsSave('calEvents',   state.calEvents).catch(()=>{});
      sheetsSave('todayStatus', state.todayStatus).catch(()=>{});
      sheetsSave('support',     state.support).catch(()=>{});
    }, 3000);
    return () => clearTimeout(saveTimerRef.current);
  }, [state]);

  function setDemData(updater) {
    setState(s => ({ ...s, demData: typeof updater==='function' ? updater(s.demData) : updater }));
  }
  function setCalEvents(updater) {
    setState(s => ({ ...s, calEvents: typeof updater==='function' ? updater(s.calEvents) : updater }));
  }
  function setTodayStatus(person, field, value) {
    setState(s => ({ ...s, todayStatus: { ...s.todayStatus, [person]: { ...s.todayStatus[person], [field]: value } } }));
  }
  function handleSupportChange(nodeId, newSup) {
    setState(s => ({ ...s, support: { ...s.support, [nodeId]: newSup } }));
  }

  if (!IS_CONFIGURED) return <SetupScreen />;
  if (loading) return (
    <div style={{minHeight:'100vh',background:'#F8F6F1',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Noto Sans TC',sans-serif"}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:40,height:40,borderRadius:12,background:'#2D4A3E',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px'}}>
          <span style={{fontSize:18,color:'#F8F6F1'}}>✦</span>
        </div>
        <p style={{fontSize:13,color:'#A09688'}}>讀取共同資料中…</p>
        {loadErr && <p style={{fontSize:12,color:'#C0887A',marginTop:6}}>{loadErr}</p>}
      </div>
    </div>
  );

  return (
    <div className="platform">
      {/* Sidebar */}
      <nav className="sidebar">
        <div className="sidebar-brand">✦</div>
        {PAGES.map(p => (
          <button key={p.key} onClick={() => setPage(p.key)} className={`nav-btn${page===p.key?' active':''}`} title={p.label}>
            <span className="nav-icon">{p.icon}</span>
            <span className="nav-label">{p.label}</span>
          </button>
        ))}
        <button onClick={fetchFromSheets} disabled={syncing} title="同步最新資料" className={`sync-btn${syncing?' spinning':''}`} style={{fontSize:15}}>↻</button>
      </nav>

      {/* Page content */}
      <div className="page-content">
        {page==='home'     && <HomePage     demData={state.demData} calEvents={state.calEvents} todayStatus={state.todayStatus} setTodayStatus={setTodayStatus} setPage={setPage} />}
        {page==='dream'    && <div style={{flex:1,display:'flex',overflow:'hidden'}}><DreamExpansionMap data={state.demData} setData={setDemData} support={state.support} onSupportChange={handleSupportChange} /></div>}
        {page==='calendar' && <CalendarPage calEvents={state.calEvents} setCalEvents={setCalEvents} />}
        {page==='projects' && <ProjectsPage demData={state.demData} setDemData={setDemData} />}
        {page==='memories' && <MemoriesPage demData={state.demData} />}
        {page==='review'   && <ReviewPage  demData={state.demData} calEvents={state.calEvents} />}
        {loadErr&&page!=='dream'&&<div style={{position:'fixed',bottom:70,left:'50%',transform:'translateX(-50%)',background:'rgba(192,136,122,.9)',color:'#FFF',fontSize:12,padding:'6px 14px',borderRadius:20,pointerEvents:'none',zIndex:30}}>{loadErr}</div>}
      </div>

      {/* Bottom nav (mobile) */}
      <nav className="bottom-nav">
        {PAGES.map(p => (
          <button key={p.key} onClick={() => setPage(p.key)} className={`nav-btn${page===p.key?' active':''}`}>
            <span className="nav-icon">{p.icon}</span>
            <span className="nav-label" style={{color:'rgba(248,246,241,.7)',fontSize:8}}>{p.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
